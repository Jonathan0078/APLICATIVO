<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title data-i18n="viewer3d.title">Visualizador 3D/2D</title>
    <link rel="stylesheet" href="../shared/base.css">
    <link rel="stylesheet" href="../../assets/icons/fontawesome.css">
    <link rel="stylesheet" href="viewer.css">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="header-content">
                <h1><i class="fa-solid fa-cube"></i> <span data-i18n="viewer3d.header">Visualizador 3D/2D</span></h1>
                <div class="theme-switcher">
                    <i class="fa-solid fa-sun"></i>
                    <label class="switch"><input type="checkbox" id="theme-toggle"><span class="slider"></span></label>
                    <i class="fa-solid fa-moon"></i>
                </div>
            </div>
        </header>
        <main class="main-content">
            <div class="upload-area" id="upload-area">
                <div class="upload-icon"><i class="fa-solid fa-cloud-arrow-up"></i></div>
                <p data-i18n="viewer3d.drop_hint">Arraste arquivos aqui</p>
                <p class="formats">STL · OBJ · DXF · GLTF · GLB · PLY · SLDPRT · SLDASM</p>
                <input type="file" id="file-input" accept=".stl,.obj,.dxf,.gltf,.glb,.ply,.sldprt,.sldasm,.slddrw,.STL,.OBJ,.DXF,.GLTF,.GLB,.PLY,.SLDPRT,.SLDASM,.SLDDRW" multiple hidden>
                <button class="btn" onclick="document.getElementById('file-input').click()"><i class="fa-solid fa-folder-open"></i> <span data-i18n="viewer3d.select_btn">Selecionar Arquivo</span></button>
            </div>
            <div class="viewport-container" id="viewport" style="display:none">
                <div class="file-info-bar" id="file-info-bar">
                    <span class="file-icon"><i class="fa-solid fa-cube"></i></span>
                    <span class="badge" id="file-badge">STL</span>
                    <span class="name" id="file-name">arquivo.stl</span>
                    <span class="quick-info" id="file-quick-info"></span>
                    <button class="close-btn" onclick="closeFile()" title="Fechar"><i class="fa-solid fa-xmark"></i></button>
                </div>
                
                <div id="three-container">
                    <div class="sidebar-backdrop" id="sidebar-backdrop"></div>
                    <button class="sidebar-toggle-btn" id="sidebar-toggle-btn" title="Abrir ferramentas"><i class="fa-solid fa-chevron-right"></i></button>
                    <div class="industrial-sidebar collapsed" id="industrial-sidebar">
                        <div class="sidebar-header" id="sidebar-toggle">
                            <span><i class="fa-solid fa-toolbox"></i> Ferramentas</span>
                            <i class="fa-solid fa-chevron-down toggle-icon"></i>
                        </div>
                        <div class="sidebar-content" id="sidebar-content">
                            <div class="sidebar-section" id="sidebar-stats-section" style="display:none">
                                <h3><i class="fa-solid fa-chart-simple"></i> <span data-i18n="viewer3d.info">Informações</span></h3>
                                <div id="sidebar-stats" class="sidebar-stats"></div>
                            </div>
                            <div class="sidebar-section">
                                <h3><i class="fa-solid fa-list-tree"></i> Componentes</h3>
                                <div id="component-tree" class="component-tree"></div>
                            </div>
                            <div class="sidebar-section">
                                <h3><i class="fa-solid fa-up-right-and-down-left-from-center"></i> Vista Explodida</h3>
                                <input type="range" id="explode-slider" min="0" max="2" step="0.01" value="0" disabled>
                            </div>
                            <div class="sidebar-section">
                                <h3><i class="fa-solid fa-scissors"></i> Plano de Corte (X)</h3>
                                <input type="range" id="clip-slider" min="-200" max="200" step="1" value="200">
                            </div>
                            <div class="sidebar-section">
                                <button id="btn-measure" class="tool-btn"><i class="fa-solid fa-ruler"></i> Medir Distância</button>
                                <button id="btn-clear-measure" class="tool-btn small-btn" style="display:none"><i class="fa-solid fa-eraser"></i> <span data-i18n="viewer3d.clear_btn">Limpar</span></button>
                                <span id="measure-result" class="measure-result"></span>
                            </div>
                            <div class="sidebar-section">
                                <h3><i class="fa-solid fa-palette"></i> <span data-i18n="viewer3d.bg_color">Cor de Fundo</span></h3>
                                <div class="bg-color-row">
                                    <input type="color" id="bg-color-picker" value="#0f0f0f">
                                    <button id="btn-reset-bg" class="tool-btn small-btn" title="Restaurar padrão">Padrão</button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="loading-overlay" id="loading-overlay"><div class="spinner"></div></div>
                    <div class="stats-overlay" id="stats-overlay"></div>
                    <div class="viewport-overlay-controls">
                        <button onclick="resetView()" title="Centralizar (F)"><i class="fa-solid fa-expand"></i></button>
                        <button data-action="wireframe" onclick="toggleWireframe()" title="Wireframe (W)"><i class="fa-solid fa-border-all"></i></button>
                        <button data-action="axes" class="active" onclick="toggleAxes()" title="Eixos (X)"><i class="fa-solid fa-arrows-up-down-left-right"></i></button>
                        <button data-action="grid" class="active" onclick="toggleGrid()" title="Grade (G)"><i class="fa-solid fa-th"></i></button>
                        <button data-action="autorotate" onclick="toggleAutoRotate()" title="Rotação Auto (R)"><i class="fa-solid fa-rotate-right"></i></button>
                        <button onclick="takeScreenshot()" title="Capturar Tela (C)"><i class="fa-solid fa-camera"></i></button>
                        <button onclick="toggleFullscreen()" title="Tela Cheia (F11)"><i class="fa-solid fa-up-right-and-down-left-from-center"></i></button>
                    </div>
                    <div class="viewport-bottom-bar" id="bottom-bar">
                        <button data-action="axes" class="active" onclick="toggleAxes()" title="Eixos"><i class="fa-solid fa-arrows-up-down-left-right"></i></button>
                        <button data-action="grid" class="active" onclick="toggleGrid()" title="Grade"><i class="fa-solid fa-th"></i></button>
                        <button data-action="wireframe" onclick="toggleWireframe()" title="Wireframe"><i class="fa-solid fa-border-all"></i></button>
                        <button onclick="resetView()" title="Centralizar"><i class="fa-solid fa-expand"></i></button>
                        <button data-action="autorotate" onclick="toggleAutoRotate()" title="Rotação"><i class="fa-solid fa-rotate-right"></i></button>
                        <button onclick="takeScreenshot()" title="Capturar"><i class="fa-solid fa-camera"></i></button>
                        <button onclick="toggleFullscreen()" title="Tela Cheia"><i class="fa-solid fa-up-right-and-down-left-from-center"></i></button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="../shared/i18n.js"></script>
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
        }
    }
    </script>
    <script type="module" src="viewer.js"></script>
</body>
</html>
