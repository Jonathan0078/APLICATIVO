<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title data-i18n="viewer3d.title">Visualizador 3D/2D</title>
    <link rel="stylesheet" href="../shared/base.css">
    <link rel="stylesheet" href="../../assets/icons/fontawesome.css">
    <style>
        :root { --accent-viewer: #8b5cf6; --accent-rgb: 139, 92, 246; }
        body.dark-theme { --accent: #8b5cf6; }
        .app-header h1 i { color: var(--accent-viewer); }
        .main-content { padding: 0; display: flex; flex-direction: column; height: calc(100vh - 60px); }
        .upload-area {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 2rem; margin: 1rem; border: 2px dashed var(--border);
            border-radius: var(--radius); transition: all .25s; cursor: pointer;
            min-height: 200px; text-align: center;
        }
        .upload-area.dragover { border-color: var(--accent-viewer); background: rgba(var(--accent-rgb), 0.08); }
        .upload-area i { font-size: 3rem; color: var(--text-secondary); margin-bottom: .75rem; }
        .upload-area p { color: var(--text-secondary); font-size: .9rem; margin-bottom: .3rem; }
        .upload-area .formats { font-size: .75rem; opacity: .6; margin-bottom: 1rem; }
        .upload-area .btn { max-width: 240px; background: linear-gradient(135deg, #6d28d9, var(--accent-viewer)); }
        .viewport-container { flex: 1; position: relative; display: flex; }
        #three-container { flex: 1; position: relative; background: var(--bg); overflow: hidden; }
        #three-container canvas { display: block; }
        .file-info-bar {
            display: flex; align-items: center; gap: 1rem; padding: .5rem 1rem;
            background: var(--surface); border-bottom: 1px solid var(--border);
            font-size: .8rem; color: var(--text-secondary); flex-wrap: wrap;
        }
        .file-info-bar .name { font-weight: 700; color: var(--text); max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .file-info-bar .badge {
            padding: 2px 8px; border-radius: 99px; font-size: .7rem; font-weight: 700;
            background: rgba(var(--accent-rgb), 0.15); color: var(--accent-viewer);
        }
        .file-info-bar .close-btn {
            margin-left: auto; cursor: pointer; padding: 4px 8px; border-radius: var(--radius-sm);
            transition: background .2s; border: none; background: none; color: var(--text-secondary); font-size: 1rem;
        }
        .file-info-bar .close-btn:hover { background: rgba(255,0,0,0.1); color: #ef4444; }
        .viewport-overlay-controls {
            position: absolute; bottom: 1rem; right: 1rem; display: flex; gap: 6px; z-index: 10;
        }
        .viewport-overlay-controls button {
            width: 38px; height: 38px; border-radius: 50%; border: none;
            background: var(--surface); color: var(--text-secondary); cursor: pointer;
            font-size: .9rem; box-shadow: 0 2px 8px rgba(0,0,0,0.15); transition: all .2s;
            display: flex; align-items: center; justify-content: center;
        }
        .viewport-overlay-controls button:hover { color: var(--text); background: var(--bg); }
        .stats-overlay {
            position: absolute; top: .5rem; left: .5rem; z-index: 10;
            font-size: .7rem; color: var(--text-secondary); background: var(--surface);
            padding: 4px 10px; border-radius: var(--radius-sm); opacity: .8;
        }
        .loading-overlay {
            position: absolute; inset: 0; z-index: 20;
            display: flex; align-items: center; justify-content: center;
            background: var(--bg); transition: opacity .3s;
        }
        .loading-overlay.hidden { opacity: 0; pointer-events: none; }
        .loading-overlay .spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--accent-viewer); border-radius: 50%; animation: spin .8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @media (max-width: 600px) {
            .upload-area { margin: .5rem; min-height: 150px; padding: 1rem; }
            .upload-area i { font-size: 2rem; }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="header-content">
                <h1><i class="fa-solid fa-cube"></i> <span data-i18n="viewer3d.header">Visualizador 3D/2D</span></h1>
                <div class="theme-switcher">
                    <i class="fa-solid fa-sun"></i>
                    <label class="switch"><input type="checkbox" id="theme-toggle"><span class="slider"></span></label>
                    <i class="fa-solid fa-moon"></i>
                </div>
            </div>
        </header>
        <main class="main-content">
            <div class="upload-area" id="upload-area">
                <i class="fa-solid fa-cloud-arrow-up"></i>
                <p data-i18n="viewer3d.drop_hint">Arraste arquivos aqui</p>
                <p class="formats">STL, OBJ, DXF, GLTF, GLB, PLY, SLDPRT, SLDASM</p>
                <input type="file" id="file-input" accept=".stl,.obj,.dxf,.gltf,.glb,.ply,.sldprt,.sldasm,.slddrw,.STL,.OBJ,.DXF,.GLTF,.GLB,.PLY,.SLDPRT,.SLDASM,.SLDDRW" multiple hidden>
                <button class="btn" onclick="document.getElementById('file-input').click()"><i class="fa-solid fa-folder-open"></i> <span data-i18n="viewer3d.select_btn">Selecionar Arquivo</span></button>
            </div>
            <div class="viewport-container" id="viewport" style="display:none">
                <div class="file-info-bar" id="file-info-bar">
                    <span class="badge" id="file-badge">STL</span>
                    <span class="name" id="file-name">arquivo.stl</span>
                    <span id="file-details"></span>
                    <button class="close-btn" onclick="closeFile()"><i class="fa-solid fa-xmark"></i></button>
                </div>
                <div id="three-container">
                    <div class="loading-overlay" id="loading-overlay"><div class="spinner"></div></div>
                    <div class="stats-overlay" id="stats-overlay"></div>
                    <div class="viewport-overlay-controls">
                        <button onclick="resetView()" title="Centralizar (F)"><i class="fa-solid fa-expand"></i></button>
                        <button onclick="toggleWireframe()" title="Wireframe (W)"><i class="fa-solid fa-border-all"></i></button>
                        <button onclick="toggleAxes()" title="Eixos (X)"><i class="fa-solid fa-arrow-up"></i></button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="../shared/i18n.js"></script>
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
        }
    }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { STLLoader } from 'three/addons/loaders/STLLoader.js';
        import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { PLYLoader } from 'three/addons/loaders/PLYLoader.js';

        let scene, camera, renderer, controls;
        let modelGroup, axesHelper, gridHelper;
        let isWireframe = false;
        let isAxesVisible = true;
        let currentFile = null;

        function initScene() {
            const container = document.getElementById('three-container');
            scene = new THREE.Scene();
            scene.background = new THREE.Color(getComputedStyle(document.body).getPropertyValue('--bg').trim() || '#0f0f0f');

            camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 10000);
            camera.position.set(200, 150, 200);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            container.appendChild(renderer.domElement);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.15;

            const ambientLight = new THREE.AmbientLight(0x404060);
            scene.add(ambientLight);
            const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
            dirLight.position.set(200, 300, 200);
            scene.add(dirLight);
            const dirLight2 = new THREE.DirectionalLight(0xffffff, 0.5);
            dirLight2.position.set(-200, -100, -200);
            scene.add(dirLight2);

            gridHelper = new THREE.GridHelper(500, 20);
            scene.add(gridHelper);
            axesHelper = new THREE.AxesHelper(150);
            scene.add(axesHelper);

            modelGroup = new THREE.Group();
            scene.add(modelGroup);

            window.addEventListener('resize', onResize);
            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        function onResize() {
            const container = document.getElementById('three-container');
            if (!container || !camera || !renderer) return;
            const w = container.clientWidth;
            const h = container.clientHeight;
            camera.aspect = w / h;
            camera.updateProjectionMatrix();
            renderer.setSize(w, h);
        }

        function resetView() {
            if (!modelGroup || modelGroup.children.length === 0) return;
            const box = new THREE.Box3().setFromObject(modelGroup);
            const center = box.getCenter(new THREE.Vector3());
            const size = box.getSize(new THREE.Vector3());
            const maxDim = Math.max(size.x, size.y, size.z);
            if (maxDim < 0.01) return;
            const dist = maxDim * 1.8;
            const dir = camera.position.clone().sub(center).normalize();
            if (dir.length() < 0.01) dir.set(1, 0.7, 1);
            camera.position.copy(center).add(dir.multiplyScalar(dist));
            controls.target.copy(center);
            controls.update();
        }

        function toggleWireframe() {
            isWireframe = !isWireframe;
            modelGroup.traverse(child => {
                if (child.isMesh) child.material.wireframe = isWireframe;
            });
        }

        function toggleAxes() {
            isAxesVisible = !isAxesVisible;
            if (axesHelper) axesHelper.visible = isAxesVisible;
        }

        function showLoading(show) {
            document.getElementById('loading-overlay').classList.toggle('hidden', !show);
        }

        function showStats(text) {
            document.getElementById('stats-overlay').textContent = text;
        }

        function closeFile() {
            while (modelGroup.children.length) modelGroup.remove(modelGroup.children[0]);
            document.getElementById('viewport').style.display = 'none';
            document.getElementById('upload-area').style.display = '';
            currentFile = null;
            showStats('');
        }

        function loadFile(file) {
            currentFile = file;
            document.getElementById('upload-area').style.display = 'none';
            document.getElementById('viewport').style.display = '';
            document.getElementById('file-name').textContent = file.name;
            document.getElementById('file-details').textContent = '';
            showStats('Carregando...');
            showLoading(true);

            const ext = file.name.split('.').pop().toLowerCase();
            document.getElementById('file-badge').textContent = ext.toUpperCase();

            if (ext === 'stl') loadSTL(file);
            else if (ext === 'obj') loadOBJ(file);
            else if (ext === 'dxf') loadDXF(file);
            else if (ext === 'gltf' || ext === 'glb') loadGLTF(file);
            else if (ext === 'ply') loadPLY(file);
            else if (ext === 'sldprt' || ext === 'sldasm' || ext === 'slddrw') {
                showStats('Exporte como STL ou OBJ no SolidWorks');
                showLoading(false);
            } else {
                showStats('Formato não suportado');
                showLoading(false);
            }
        }

        async function loadSTL(file) {
            try {
                const buffer = await file.arrayBuffer();
                const loader = new STLLoader();
                const geo = loader.parse(buffer);
                const mat = new THREE.MeshStandardMaterial({
                    color: 0x8b5cf6, metalness: 0.3, roughness: 0.6,
                    flatShading: true, side: THREE.DoubleSide
                });
                const mesh = new THREE.Mesh(geo, mat);
                while (modelGroup.children.length) modelGroup.remove(modelGroup.children[0]);
                modelGroup.add(mesh);
                const verts = geo.attributes.position.count;
                const faces = verts / 3;
                document.getElementById('file-details').textContent = `${faces.toLocaleString()} triângulos`;
                showStats('OK');
                showLoading(false);
                resetView();
            } catch (e) {
                showStats('Erro: ' + e.message);
                showLoading(false);
            }
        }

        async function loadOBJ(file) {
            try {
                const text = await file.text();
                const loader = new OBJLoader();
                const obj = loader.parse(text);
                const mat = new THREE.MeshStandardMaterial({
                    color: 0x8b5cf6, metalness: 0.3, roughness: 0.6, side: THREE.DoubleSide
                });
                obj.traverse(child => {
                    if (child.isMesh) child.material = mat;
                });
                while (modelGroup.children.length) modelGroup.remove(modelGroup.children[0]);
                modelGroup.add(obj);
                let faceCount = 0;
                obj.traverse(c => { if (c.isMesh && c.geometry.attributes.position) faceCount += c.geometry.attributes.position.count / 3; });
                document.getElementById('file-details').textContent = `${faceCount.toLocaleString()} triângulos`;
                showStats('OK');
                showLoading(false);
                resetView();
            } catch (e) {
                showStats('Erro: ' + e.message);
                showLoading(false);
            }
        }

        async function loadGLTF(file) {
            try {
                const buffer = await file.arrayBuffer();
                const loader = new GLTFLoader();
                const gltf = await new Promise((resolve, reject) => {
                    loader.parse(buffer, '', resolve, reject);
                });
                const mat = new THREE.MeshStandardMaterial({
                    color: 0x8b5cf6, metalness: 0.3, roughness: 0.6, side: THREE.DoubleSide
                });
                gltf.scene.traverse(child => {
                    if (child.isMesh) child.material = mat;
                });
                while (modelGroup.children.length) modelGroup.remove(modelGroup.children[0]);
                modelGroup.add(gltf.scene);
                let faceCount = 0;
                gltf.scene.traverse(c => { if (c.isMesh && c.geometry.attributes.position) faceCount += c.geometry.attributes.position.count / 3; });
                document.getElementById('file-details').textContent = `${faceCount.toLocaleString()} triângulos`;
                showStats('OK');
                showLoading(false);
                resetView();
            } catch (e) {
                showStats('Erro: ' + e.message);
                showLoading(false);
            }
        }

        async function loadPLY(file) {
            try {
                const buffer = await file.arrayBuffer();
                const loader = new PLYLoader();
                const geo = loader.parse(buffer);
                const mat = new THREE.MeshStandardMaterial({
                    color: 0x8b5cf6, metalness: 0.3, roughness: 0.6,
                    flatShading: true, side: THREE.DoubleSide
                });
                const mesh = new THREE.Mesh(geo, mat);
                while (modelGroup.children.length) modelGroup.remove(modelGroup.children[0]);
                modelGroup.add(mesh);
                const verts = geo.attributes.position ? geo.attributes.position.count : 0;
                const faces = verts / 3;
                document.getElementById('file-details').textContent = `${faces.toLocaleString()} triângulos`;
                showStats('OK');
                showLoading(false);
                resetView();
            } catch (e) {
                showStats('Erro: ' + e.message);
                showLoading(false);
            }
        }

        async function loadDXF(file) {
            try {
                const text = await file.text();
                const entities = parseDXF(text);
                if (entities.length === 0) { showStats('Nenhuma entidade encontrada'); showLoading(false); return; }

                const group = new THREE.Group();
                const matLine = new THREE.LineBasicMaterial({ color: 0x8b5cf6 });
                const matPoint = new THREE.PointsMaterial({ color: 0x8b5cf6, size: 3 });

                const allPoints = [];

                for (const ent of entities) {
                    if (ent.type === 'LINE') {
                        const geo = new THREE.BufferGeometry().setFromPoints([
                            new THREE.Vector3(ent.x1, ent.z1 || 0, ent.y1),
                            new THREE.Vector3(ent.x2, ent.z2 || 0, ent.y2)
                        ]);
                        group.add(new THREE.Line(geo, matLine));
                    } else if (ent.type === 'CIRCLE') {
                        const segs = 48;
                        const pts = [];
                        for (let i = 0; i <= segs; i++) {
                            const a = (i / segs) * Math.PI * 2;
                            pts.push(new THREE.Vector3(
                                ent.cx + ent.r * Math.cos(a), ent.cz || 0, ent.cy + ent.r * Math.sin(a)
                            ));
                        }
                        group.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), matLine));
                    } else if (ent.type === 'ARC') {
                        const segs = 48;
                        const pts = [];
                        const sa = ent.sa * Math.PI / 180;
                        const ea = ent.ea * Math.PI / 180;
                        const steps = Math.max(12, Math.floor(segs * Math.abs(ea - sa) / (Math.PI * 2)));
                        for (let i = 0; i <= steps; i++) {
                            const a = sa + (ea - sa) * (i / steps);
                            pts.push(new THREE.Vector3(
                                ent.cx + ent.r * Math.cos(a), ent.cz || 0, ent.cy + ent.r * Math.sin(a)
                            ));
                        }
                        group.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), matLine));
                    } else if (ent.type === 'LWPOLYLINE' || ent.type === 'POLYLINE') {
                        if (ent.vertices && ent.vertices.length > 1) {
                            const pts = ent.vertices.map(v =>
                                new THREE.Vector3(v.x, v.z || 0, v.y)
                            );
                            if (ent.closed) pts.push(pts[0].clone());
                            group.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), matLine));
                        }
                    } else if (ent.type === 'POINT') {
                        allPoints.push(new THREE.Vector3(ent.x, ent.z || 0, ent.y));
                    }
                }

                if (allPoints.length > 0) {
                    const geo = new THREE.BufferGeometry().setFromPoints(allPoints);
                    group.add(new THREE.Points(geo, matPoint));
                }

                while (modelGroup.children.length) modelGroup.remove(modelGroup.children[0]);
                modelGroup.add(group);
                document.getElementById('file-details').textContent = `${entities.length} entidades`;
                showStats('OK');
                showLoading(false);
                resetView();
            } catch (e) {
                showStats('Erro: ' + e.message);
                showLoading(false);
            }
        }

        function parseDXF(text) {
            const lines = text.split(/\r?\n/);
            const pairs = [];
            for (let i = 0; i < lines.length - 1; i += 2) {
                const code = parseInt(lines[i].trim());
                const val = lines[i + 1].trim();
                if (!isNaN(code)) pairs.push({ code, val });
            }

            let inEntities = false, inBlock = false, skipBlock = false;
            const entities = [];

            for (let i = 0; i < pairs.length; i++) {
                const p = pairs[i];
                if (p.code === 0 && p.val === 'SECTION') {
                    const next = pairs[i + 1];
                    if (next && next.code === 2) {
                        if (next.val === 'ENTITIES') inEntities = true;
                        else if (next.val === 'BLOCKS') inBlock = true;
                        else if (next.val === 'HEADER' || next.val === 'CLASSES' || next.val === 'TABLES' || next.val === 'OBJECTS' || next.val === 'THUMBNAILIMAGE') { /* skip */ }
                    }
                    continue;
                }
                if (p.code === 0 && p.val === 'ENDSEC') { inEntities = false; inBlock = false; continue; }

                if (inEntities && p.code === 0 && p.val !== 'ENDBLK') {
                    const ent = { type: p.val };
                    entities.push(ent);
                    let j = i + 1;
                    while (j < pairs.length && !(pairs[j].code === 0 && ['LINE','CIRCLE','ARC','LWPOLYLINE','POLYLINE','POINT','TEXT','MTEXT','INSERT','SOLID','TRACE','3DFACE','VERTEX','SEQEND','ENDBLK','ELLIPSE','SPLINE','HATCH','DIMENSION','ATTRIB','ATTDEF','SHAPE','BODY','REGION','3DSOLID','SURFACE','MESH','LIGHT','CAMERA'].includes(pairs[j].val))) {
                        const c = pairs[j].code;
                        const v = pairs[j].val;
                        if (c === 10) ent.x1 = parseFloat(v);
                        else if (c === 20) ent.y1 = parseFloat(v);
                        else if (c === 30) ent.z1 = parseFloat(v);
                        else if (c === 11) ent.x2 = parseFloat(v);
                        else if (c === 21) ent.y2 = parseFloat(v);
                        else if (c === 31) ent.z2 = parseFloat(v);
                        else if (c === 40) ent.r = parseFloat(v);
                        else if (c === 50) ent.sa = parseFloat(v);
                        else if (c === 51) ent.ea = parseFloat(v);
                        else if (c === 70) ent.flags = parseInt(v);
                        else if (c === 90) ent.count = parseInt(v);
                        else if (c === 1) ent.text = v;
                        else if (c === 8) ent.layer = v;
                        j++;
                    }
                    if (ent.type === 'LWPOLYLINE') {
                        ent.vertices = [];
                        ent.closed = (ent.flags & 1) === 1;
                        let k = i + 1;
                        while (k < pairs.length && pairs[k].code !== 0) {
                            if (pairs[k].code === 10) {
                                const vx = parseFloat(pairs[k].val);
                                const vy = parseFloat(pairs[k + 1]?.val || '0');
                                if (pairs[k + 1]?.code === 20) {
                                    ent.vertices.push({ x: vx, y: vy, z: 0 });
                                    k += 2;
                                    continue;
                                }
                            }
                            k++;
                        }
                    }
                    if (ent.type === 'POLYLINE') {
                        ent.vertices = [];
                        ent.closed = (ent.flags & 1) === 1;
                    }
                    if (ent.type === 'VERTEX') {
                        for (let k = entities.length - 2; k >= 0; k--) {
                            if (entities[k].type === 'POLYLINE') {
                                if (!entities[k].vertices) entities[k].vertices = [];
                                entities[k].vertices.push({ x: ent.x1 || 0, y: ent.y1 || 0, z: ent.z1 || 0 });
                                break;
                            }
                        }
                    }
                    if (ent.type === 'INSERT') {
                        const blockName = ent.text || '';
                    }
                }
            }

            const filtered = [];
            for (const e of entities) {
                if (e.type === 'LINE' || e.type === 'CIRCLE' || e.type === 'ARC' || e.type === 'POINT') {
                    filtered.push(e);
                } else if (e.type === 'LWPOLYLINE' && e.vertices && e.vertices.length > 0) {
                    filtered.push(e);
                } else if (e.type === 'POLYLINE' && e.vertices && e.vertices.length > 0) {
                    filtered.push(e);
                }
            }
            return filtered;
        }

        document.addEventListener('DOMContentLoaded', () => {
            if (typeof i18n !== 'undefined') i18n.translatePage();
            const t = document.getElementById('theme-toggle');
            if (localStorage.getItem('theme') === 'dark') { document.body.classList.add('dark-theme'); t.checked = true; }
            t.addEventListener('change', () => {
                document.body.classList.toggle('dark-theme');
                localStorage.setItem('theme', document.body.classList.contains('dark-theme') ? 'dark' : 'light');
                if (scene) scene.background = new THREE.Color(getComputedStyle(document.body).getPropertyValue('--bg').trim() || '#0f0f0f');
            });

            initScene();
            const upload = document.getElementById('upload-area');
            const fileInput = document.getElementById('file-input');

            upload.addEventListener('click', e => { if (e.target.tagName !== 'BUTTON' && e.target.tagName !== 'I') fileInput.click(); });
            upload.addEventListener('dragover', e => { e.preventDefault(); upload.classList.add('dragover'); });
            upload.addEventListener('dragleave', () => upload.classList.remove('dragover'));
            upload.addEventListener('drop', e => {
                e.preventDefault(); upload.classList.remove('dragover');
                if (e.dataTransfer.files.length) loadFile(e.dataTransfer.files[0]);
            });
            fileInput.addEventListener('change', () => {
                if (fileInput.files.length) loadFile(fileInput.files[0]);
            });

            document.addEventListener('keydown', e => {
                if (e.key === 'f' || e.key === 'F') resetView();
                if (e.key === 'w' || e.key === 'W') toggleWireframe();
                if (e.key === 'x' || e.key === 'X') toggleAxes();
            });
        });

        window.closeFile = closeFile;
        window.resetView = resetView;
