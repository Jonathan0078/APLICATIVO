<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="escalas.page_title">Conversor de Escalas Lineares Pro</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon"> 
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="../../assets/icons/fontawesome.css">
</head>
<body>

    <div class="app-container">
        <header class="app-header">
            <div class="header-content">
                <h1><i class="fa-solid fa-ruler-combined"></i> <span data-i18n="escalas.title">Conversor de Escalas Pro</span></h1>
                <div class="theme-switcher">
                    <i class="fa-solid fa-sun"></i>
                    <label class="switch">
                        <input type="checkbox" id="theme-toggle-checkbox">
                        <span class="slider"></span>
                    </label>
                    <i class="fa-solid fa-moon"></i>
                </div>
            </div>
        </header>

        <main class="app-main">
            <div id="inputs-column">
                <div class="card">
                    <h2><i class="fa-solid fa-sliders"></i> <span data-i18n="escalas.config">Configuração das Faixas</span></h2>
                    
                    <h3 style="font-size: 0.9rem; color: var(--text-secondary); margin-bottom: 0.5rem;" data-i18n="escalas.pv_section">Variável de Processo (PV)</h3>
                    <div class="input-grid">
                        <div class="input-group">
                            <label for="inputLow" data-i18n="escalas.min">Mínimo (Ex: 0 bar)</label>
                            <input type="number" id="inputLow" placeholder="0" data-i18n-placeholder="escalas.min_placeholder">
                        </div>
                        <div class="input-group">
                            <label for="inputHigh" data-i18n="escalas.max">Máximo (Ex: 100 bar)</label>
                            <input type="number" id="inputHigh" placeholder="100" data-i18n-placeholder="escalas.max_placeholder">
                        </div>
                    </div>

                    <h3 style="font-size: 0.9rem; color: var(--text-secondary); margin-top: 1rem; margin-bottom: 0.5rem;" data-i18n="escalas.signal_section">Sinal Elétrico (mA / V)</h3>
                    <div class="input-grid">
                        <div class="input-group">
                            <label for="outputLow" data-i18n="escalas.min">Mínimo (Ex: 4 mA)</label>
                            <input type="number" id="outputLow" placeholder="4" data-i18n-placeholder="escalas.signal_min_placeholder">
                        </div>
                        <div class="input-group">
                            <label for="outputHigh" data-i18n="escalas.max">Máximo (Ex: 20 mA)</label>
                            <input type="number" id="outputHigh" placeholder="20" data-i18n-placeholder="escalas.signal_max_placeholder">
                        </div>
                    </div>
                </div>
            </div>

            <div id="outputs-column">
                <div class="card" id="results-card">
                    <h2><i class="fa-solid fa-calculator"></i> <span data-i18n="escalas.conversions">Calculadora de Conversão</span></h2>

                    <div id="erro-container" class="resultado-container error hidden" style="margin-top: 0; margin-bottom: 1.5rem;">
                        <div class="resultado-display">
                            <span class="result-main-text"><i class="fa-solid fa-triangle-exclamation"></i> <span data-i18n="escalas.attention">Atenção</span></span>
                            
                            <span id="erro-msg" class="result-sub-text"></span>
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="calcInputPv" data-i18n="escalas.process_value">Valor de Processo (PV)</label>
                        <input type="number" id="calcInputPv" placeholder="Ex: 50" data-i18n-placeholder="escalas.pv_placeholder">
                    </div>

                    <div class="input-group">
                        <label for="calcInputSignal" data-i18n="escalas.signal_value">Sinal Equivalente (mA / V)</label>
                        <input type="number" id="calcInputSignal" placeholder="Ex: 12" data-i18n-placeholder="escalas.signal_placeholder">
                    </div>

                    <div class="input-group">
                        <label for="calcInputBits" data-i18n="escalas.bits_value">Valor em Bits (0 a 65535)</label>
                        <input type="number" id="calcInputBits" placeholder="Ex: 32767" data-i18n-placeholder="escalas.bits_placeholder">
                    </div>

                    <div class="info-box" data-i18n="escalas.dica"></div>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
    <script src="../shared/i18n.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const themeToggle = document.getElementById('theme-toggle-checkbox');
            // Verifica a preferência salva no LocalStorage, caso exista
            if (localStorage.getItem('theme') === 'dark') {
                document.body.classList.add('dark-theme');
                themeToggle.checked = true;
            }

            themeToggle.addEventListener('change', (e) => {
                if (e.target.checked) {
                    document.body.classList.add('dark-theme');
                    localStorage.setItem('theme', 'dark');
                } else {
                    document.body.classList.remove('dark-theme');
                    localStorage.setItem('theme', 'light');
                }
            });
        });
    </script>
</body>
</html>
