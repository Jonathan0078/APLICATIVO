<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title data-i18n="grease.iv">Índice de Viscosidade - GreasePRO</title>
    
    <!-- Estilos -->
    <link rel="stylesheet" href="../../assets/icons/fontawesome.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/menu-button.css">

    <!-- Scripts -->
    <script src="js/ViscosidadeCtrl.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- Cabeçalho -->
        <header class="app-header">
            <div class="header-content">
                <button class="menu-button" aria-label="Abrir menu">
                    <i class="fas fa-bars"></i>
                </button>
                <h1><i class="fas fa-thermometer-half"></i> <span data-i18n="grease.iv.page_title">Índice de Viscosidade</span></h1>
                <div class="theme-switcher">
                    <i class="fas fa-sun"></i>
                    <label class="switch">
                        <input type="checkbox" id="theme-toggle">
                        <span class="slider"></span>
                    </label>
                    <i class="fas fa-moon"></i>
                </div>
            </div>
        </header>

        <!-- Conteúdo Principal -->
        <main class="app-main">
            <!-- Coluna da Esquerda: Entradas -->
            <div id="inputs-column">
                <!-- Card de Instruções -->
                <div class="card">
                    <h2><i class="fas fa-info-circle"></i> <span data-i18n="grease.instructions">Instruções</span></h2>
                    <div class="input-group">
                        <label for="calculadora" data-i18n="grease.iv.select_label">Selecione o tipo de cálculo:</label>
                        <select id="calculadora" onchange="validarC()">
                            <option selected data-i18n="grease.select_option">Selecione uma opção</option>
                            <option value="1" data-i18n="grease.iv.opt1">1. Calcular o Índice de Viscosidade (IV)</option>
                            <option value="2" data-i18n="grease.iv.opt2">2. Calcular a Viscosidade a 100ºC</option>
                            <option value="3" data-i18n="grease.iv.opt3">3. Calcular a Viscosidade a 40ºC</option>
                        </select>
                    </div>
                </div>

                <!-- Card de Cálculo 1 -->
                <div class="card" id="tabla1" style="display: none;">
                    <h2 data-i18n="grease.iv.section1">1. Calcular Índice de Viscosidade (IV)</h2>
                    <div class="input-group">
                        <label for="vis40c" data-i18n="grease.iv.visc_40">Viscosidade a 40°C (cSt)</label>
                        <input id="vis40c" type="number" placeholder="Ex: 100">
                    </div>
                    <div class="input-group">
                        <label for="vis100c" data-i18n="grease.iv.visc_100">Viscosidade a 100°C (cSt)</label>
                        <input id="vis100c" type="number" placeholder="Ex: 10">
                    </div>
                    <div class="button-group">
                        <button class="main-button" onclick="validarIV()"><i class="fas fa-calculator"></i> <span data-i18n="calc.btn">Calcular</span></button>
                        <button class="secondary-button" onclick="limpiarC()"><i class="fas fa-eraser"></i> <span data-i18n="reset.btn">Limpar</span></button>
                    </div>
                </div>

                <!-- Card de Cálculo 2 -->
                <div class="card" id="tabla2" style="display: none;">
                    <h2 data-i18n="grease.iv.section2">2. Calcular Viscosidade a 100°C</h2>
                    <div class="input-group">
                        <label for="inVis" data-i18n="grease.iv.vi_input">Índice de Viscosidade (IV)</label>
                        <input id="inVis" type="number" placeholder="Ex: 95">
                    </div>
                    <div class="input-group">
                        <label for="visc40c" data-i18n="grease.iv.visc_40">Viscosidade a 40°C (cSt)</label>
                        <input id="visc40c" type="number" placeholder="Ex: 100">
                    </div>
                    <div class="button-group">
                        <button class="main-button" onclick="validar100()"><i class="fas fa-calculator"></i> <span data-i18n="calc.btn">Calcular</span></button>
                        <button class="secondary-button" onclick="limpiarC()"><i class="fas fa-eraser"></i> <span data-i18n="reset.btn">Limpar</span></button>
                    </div>
                </div>

                <!-- Card de Cálculo 3 -->
                <div class="card" id="tabla3" style="display: none;">
                    <h2 data-i18n="grease.iv.section3">3. Calcular Viscosidade a 40°C</h2>
                    <div class="input-group">
                        <label for="inVisc" data-i18n="grease.iv.vi_input">Índice de Viscosidade (IV)</label>
                        <input id="inVisc" type="number" placeholder="Ex: 95">
                    </div>
                    <div class="input-group">
                        <label for="visco100c" data-i18n="grease.iv.visc_100">Viscosidade a 100°C (cSt)</label>
                        <input id="visco100c" type="number" placeholder="Ex: 10">
                    </div>
                    <div class="button-group">
                        <button class="main-button" onclick="validar40()"><i class="fas fa-calculator"></i> <span data-i18n="calc.btn">Calcular</span></button>
                        <button class="secondary-button" onclick="limpiarC()"><i class="fas fa-eraser"></i> <span data-i18n="reset.btn">Limpar</span></button>
                    </div>
                </div>
            </div>

            <!-- Coluna da Direita: Saídas -->
            <div id="outputs-column">
                <!-- Card de Resultados -->
                <div id="results-card" class="card">
                    <div class="card-header">
                        <h2><i class="fas fa-chart-bar"></i> <span data-i18n="result.title">Resultados</span></h2>
                    </div>
                    
                    <div class="result-placeholder" id="result-placeholder">
                        <i class="fas fa-search"></i>
                        <p data-i18n="grease.results_placeholder">Os resultados aparecerão aqui.</p>
                    </div>

                    <div class="result-content" id="result-content" style="display: none;">
                        <div class="result-header">
                            <span id="result-label" class="label">Resultado</span>
                            <span id="result-value" class="designation-value">0</span>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="../shared/i18n.js"></script>
    <script>
        // Lógica para o seletor de tema
        const themeToggle = document.getElementById('theme-toggle');
        themeToggle.addEventListener('change', () => {
            document.body.classList.toggle('dark-theme');
        });
    </script>
<script src="js/menu-button.js"></script>
</body>
</html>
