<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Parafusos</title>
    <!-- Link para a folha de estilos CSS -->
    <link rel="stylesheet" href="style.css">
    <!-- Biblioteca MathJax para renderização de fórmulas matemáticas -->
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>
<body>

    <header>
        <h1>Calculadora de Parafusos</h1>
        <p>Análise de Tração, Cisalhamento e Torque</p>
    </header>

    <div class="main-container">
        <div class="calculator-container">
            <h2>Dados de Entrada</h2>
            <div class="input-grid">
                <div class="input-group">
                    <label for="bolt-system">Sistema</label>
                    <select id="bolt-system">
                        <option value="metric">Métrico (mm)</option>
                        <option value="inch">Polegadas</option>
                    </select>
                </div>
                <div class="input-group">
                    <label for="bolt-size">Tamanho</label>
                    <select id="bolt-size"></select>
                </div>
                <div class="input-group">
                    <label for="bolt-class">Classe</label>
                    <select id="bolt-class"></select>
                </div>
                 <div class="input-group">
                    <label for="safety-factor">Fator de Segurança (FS)</label>
                    <input type="number" id="safety-factor" value="3" min="1" step="0.1">
                </div>
                 <div class="input-group">
                    <label for="k-factor" class="tooltip-container">
                        <span>Fator K (Atrito)</span>
                        <span class="info-icon">?</span>
                        <span class="tooltip-text">
                            <b>Valores comuns:</b><br>
                            <b>0.15:</b> Parafuso lubrificado.<br>
                            <b>0.20:</b> Parafuso zincado (padrão).<br>
                            <b>0.30:</b> Parafuso a seco (sem tratamento).
                        </span>
                    </label>
                    <input type="number" id="k-factor" value="0.2" min="0.1" step="0.01">
                </div>
            </div>
            <button id="calcular-btn" class="full-width">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 10h4v4h-4v-4M6 10H2v4h4v-4m.5-7.5L4 5l2.5 2.5M15 2.5L12.5 5 15 7.5m-1.5 11.5L11 21.5l2.5-2.5m-8.5 2.5L7.5 19 5 16.5m8-11a2 2 0 0 0-2-2h-2a2 2 0 0 0-2 2v2a2 2 0 0 0 2 2h2a2 2 0 0 0 2-2v-2z"></path></svg>
                <span>Calcular</span>
            </button>
        </div>

        <div id="results-section-wrapper" class="hidden">
            <div class="resultado-container">
                <h2>Resultados</h2>
                <div id="torque-card" class="resultado-card resultado-card-destaque"></div>
                <div id="traction-card" class="resultado-card"></div>
                <div id="shear-card" class="resultado-card"></div>
            </div>
            <!-- Container de debug visível somente quando ativado -->
            <div id="debug-values" class="resultado-card" style="display:none; margin-top:1rem;">
                <h3>Debug (valores brutos)</h3>
                <pre id="debug-pre" style="white-space:pre-wrap; word-break:break-word; font-size:0.85rem;"></pre>
            </div>
        </div>
        <div id="error-message" class="erro-container hidden"></div>
    </div>

    <!-- Link para o arquivo JavaScript -->
    <script src="script.js"></script>

</body>
</html>
