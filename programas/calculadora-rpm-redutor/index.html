<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title data-i18n="rpm.title">Calculadora de RPM do Redutor</title>
    <link rel="stylesheet" href="../../assets/icons/fontawesome.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="header-content">
                <h1>
                    <i class="fa-solid fa-cogs"></i>
                    <span data-i18n="rpm.title">Calculadora de RPM do Redutor</span>
                </h1>
                <div class="theme-switcher">
                    <i class="fa-solid fa-sun"></i>
                    <label class="switch">
                        <input type="checkbox" id="theme-toggle">
                        <span class="slider"></span>
                    </label>
                    <i class="fa-solid fa-moon"></i>
                </div>
            </div>
        </header>

        <div class="main-container">
            <div class="tabs-container">
                <button class="tab-btn active" data-tab="tab-params" data-i18n="rpm.params_tab">Parâmetros</button>
                <button class="tab-btn" data-tab="tab-results" id="btn-tab-results" data-i18n="rpm.results_tab">Resultados</button>
            </div>

            <div id="tab-params" class="tab-content active">
                <div class="calculator-container">
                    <div class="input-grid">
                        <div class="input-group full-width">
                            <label for="motor-select" class="tooltip-container">
                                <span data-i18n="rpm.select_motor">Selecione o Motor</span>
                                <span class="info-icon">?</span>
                                <span class="tooltip-text" data-i18n="rpm.tooltip_motor">Escolha o tipo de motor elétrico baseado no número de polos. Para motores não listados, selecione 'Personalizado' e insira o RPM manualmente.</span>
                            </label>
                            <select id="motor-select">
                                <option value="2 Polos">2 Polos (3500 RPM)</option>
                                <option value="4 Polos">4 Polos (1750 RPM)</option>
                                <option value="6 Polos">6 Polos (1150 RPM)</option>
                                <option value="8 Polos">8 Polos (875 RPM)</option>
                                <option value="10 Polos">10 Polos (700 RPM)</option>
                                <option value="Personalizado" data-i18n="rpm.custom">Personalizado</option>
                            </select>
                            <div id="motor-error" class="error" role="alert"></div>
                        </div>

                        <div id="custom-rpm" class="input-group full-width" style="display: none;">
                            <label for="custom-rpm-input" data-i18n="rpm.custom_rpm">RPM do Motor Personalizado</label>
                            <input type="number" id="custom-rpm-input" placeholder="Ex: 3000" data-i18n-placeholder="rpm.custom_rpm_placeholder">
                            <div id="custom-error" class="error" role="alert"></div>
                        </div>

                        <div class="input-group">
                            <label for="reduction-input" class="tooltip-container">
                                <span data-i18n="rpm.reduction">Taxa de Redução (i)</span>
                                <span class="info-icon">?</span>
                                <span class="tooltip-text" data-i18n="rpm.tooltip_reduction">A taxa de redução do redutor, também chamada de relação de transmissão. Exemplo: 40 significa que o redutor reduz a velocidade em 40 vezes.</span>
                            </label>
                            <input type="number" id="reduction-input" placeholder="Ex: 40" data-i18n-placeholder="rpm.reduction_placeholder" min="0.1" step="0.1">
                            <div id="reduction-error" class="error" role="alert"></div>
                        </div>

                        <div class="input-group">
                            <label for="power-input" class="tooltip-container">
                                <span data-i18n="rpm.power_kw">Potência do Motor (kW)</span>
                                <span class="info-icon">?</span>
                                <span class="tooltip-text" data-i18n="rpm.tooltip_power">Potência nominal do motor em quilowatts (kW). Necessária para calcular torque. Deixe vazio se não quiser calcular torque.</span>
                            </label>
                            <input type="number" id="power-input" placeholder="Ex: 5.5" data-i18n-placeholder="rpm.power_placeholder" min="0.1" step="0.1">
                        </div>

                        <div class="input-group full-width">
                            <label for="efficiency-input" class="tooltip-container">
                                <span data-i18n="rpm.efficiency">Eficiência do Redutor (%)</span>
                                <span class="info-icon">?</span>
                                <span class="tooltip-text" data-i18n="rpm.tooltip_efficiency">Eficiência mecânica do redutor em porcentagem. Valor típico: 90-98%. Afeta o cálculo de torque de saída.</span>
                            </label>
                            <input type="number" id="efficiency-input" value="95" min="1" max="100" step="0.1">
                        </div>
                    </div>

                    <button type="button" id="calculate-btn" class="main-button"><i class="fa-solid fa-calculator"></i> <span data-i18n="calc.btn">Calcular</span></button>
                    <button type="button" id="reset-btn" class="accordion-btn" data-i18n="reset.btn">Limpar</button>
                </div>
            </div>

            <div id="tab-results" class="tab-content">
                <div class="resultado-container">
                    <div id="result" class="resultado-card resultado-card-destaque" style="display: none;">
                        <h3><span data-i18n="rpm.final_rpm">RPM Final</span> <i class="fa-solid fa-tachometer-alt"></i></h3>
                        <div class="resultado-grid">
                            <div><span class="valor" id="rpm-final">0</span><p>RPM</p></div>
                        </div>
                    </div>

                    <div class="resultado-card">
                        <h3 data-i18n="rpm.diagram_title">Diagrama do Trem de Acionamento</h3>
                        <div id="diagram" class="diagram">
                            <svg viewBox="0 0 400 150" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Diagrama do trem de acionamento">
                                <defs>
                                    <linearGradient id="motorGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                                        <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:1" />
                                        <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
                                    </linearGradient>
                                    <linearGradient id="reducerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                                        <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
                                        <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
                                    </linearGradient>
                                    <linearGradient id="outputGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                                        <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:1" />
                                        <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
                                    </linearGradient>
                                    <filter id="blockShadow" x="-30%" y="-30%" width="160%" height="160%">
                                        <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.35"/>
                                    </filter>
                                </defs>

                                <!-- Trilho de base conectando os blocos -->
                                <line x1="45" y1="120" x2="355" y2="120" stroke="#94a3b8" stroke-width="3" stroke-dasharray="2 6" stroke-linecap="round" />

                                <!-- Motor -->
                                <rect x="10" y="30" width="90" height="75" rx="10" fill="url(#motorGrad)" stroke="#0f172a" stroke-width="2" filter="url(#blockShadow)" />
                                <text x="55" y="62" text-anchor="middle" fill="white" font-size="17" font-weight="700" font-family="Inter, sans-serif" data-i18n="rpm.motor">Motor</text>
                                <text x="55" y="85" text-anchor="middle" fill="#dbeafe" font-size="13" font-family="Inter, sans-serif" id="motor-rpm">RPM: -</text>

                                <polygon points="103,67 122,58 122,76" fill="#f59e0b" filter="url(#blockShadow)" />

                                <!-- Redutor -->
                                <rect x="125" y="22" width="115" height="91" rx="10" fill="url(#reducerGrad)" stroke="#0f172a" stroke-width="2" filter="url(#blockShadow)" />
                                <text x="182" y="60" text-anchor="middle" fill="white" font-size="17" font-weight="700" font-family="Inter, sans-serif" data-i18n="rpm.reducer">Redutor</text>
                                <text x="182" y="85" text-anchor="middle" fill="#dbeafe" font-size="13" font-family="Inter, sans-serif" id="reduction-ratio">i: -</text>

                                <polygon points="243,67 262,58 262,76" fill="#f59e0b" filter="url(#blockShadow)" />

                                <!-- Saída -->
                                <rect x="265" y="30" width="90" height="75" rx="10" fill="url(#outputGrad)" stroke="#0f172a" stroke-width="2" filter="url(#blockShadow)" />
                                <text x="310" y="62" text-anchor="middle" fill="white" font-size="17" font-weight="700" font-family="Inter, sans-serif" data-i18n="rpm.output">Saída</text>
                                <text x="310" y="85" text-anchor="middle" fill="#dbeafe" font-size="13" font-family="Inter, sans-serif" id="output-rpm">RPM: -</text>
                            </svg>
                        </div>
                    </div>

                    <div id="torque-result" class="resultado-card" style="display: none;">
                        <h3 data-i18n="rpm.torque_title">Torque</h3>
                        <div class="resultado-grid">
                            <div><p data-i18n="rpm.input_torque">Torque de Entrada</p><span class="valor" id="torque-input">0</span><p>Nm</p></div>
                            <div><p data-i18n="rpm.output_torque">Torque de Saída</p><span class="valor" id="torque-output">0</span><p>Nm</p></div>
                        </div>
                    </div>

                    <div class="export-buttons">
                        <button id="print-btn" class="main-button"><i class="fa-solid fa-print"></i> <span data-i18n="btn.print">Imprimir</span></button>
                        <button id="copy-btn" class="main-button"><i class="fa-solid fa-copy"></i> <span data-i18n="rpm.copy">Copiar</span></button>
                    </div>

                    <div class="resultado-card">
                        <h3><i class="fa-solid fa-history"></i> <span data-i18n="label.history">Histórico</span></h3>
                        <ul id="history-list"></ul>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../shared/i18n.js"></script>
    <script src="script.js"></script>
</body>
</html>
