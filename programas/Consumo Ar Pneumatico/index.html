<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title data-i18n="consumo_ar.title">Consumo de Ar</title>
    <link rel="stylesheet" href="../shared/base.css">
    <link rel="stylesheet" href="../../assets/icons/fontawesome.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app-container">
    <header class="app-header">
        <div class="header-content">
            <h1><i class="fa-solid fa-wind" style="margin-right:8px"></i> <span data-i18n="consumo_ar.title">Consumo de Ar</span></h1>
            <div class="theme-switcher">
                <label class="switch">
                    <input type="checkbox" id="themeToggle">
                    <span class="slider"></span>
                </label>
            </div>
        </div>
    </header>

    <main class="main-content">
        <div class="card">
            <h2><i class="fa-solid fa-table-cells"></i> <span data-i18n="consumo_ar.cylinders">Cilindros do Sistema</span></h2>
            <div id="cylindersList"></div>
            <button class="btn-secondary" onclick="addCylinder()"><i class="fa-solid fa-plus"></i> <span data-i18n="consumo_ar.add_cylinder">Adicionar Cilindro</span></button>
        </div>

        <div class="card">
            <div class="input-grid">
                <div class="input-group">
                    <label for="fatorCarga" data-i18n="consumo_ar.fator_carga">Fator de Carga (%)</label>
                    <input type="number" id="fatorCarga" value="50" min="1" max="100" step="1" data-i18n-placeholder="consumo_ar.fator_carga_ph">
                </div>
                <div class="input-group">
                    <label for="folga" data-i18n="consumo_ar.folga">Folga de Segurança (%)</label>
                    <input type="number" id="folga" value="20" min="0" max="100" step="5" data-i18n-placeholder="consumo_ar.folga_ph">
                </div>
            </div>
            <button class="btn-primary" onclick="calcular()"><i class="fa-solid fa-calculator"></i> <span data-i18n="calc.btn">Calcular</span></button>
        </div>

        <div class="card" id="resultCard" style="display:none">
            <h2><i class="fa-solid fa-chart-simple"></i> <span data-i18n="result.title">Resultados</span></h2>
            <div id="resultContent"></div>
        </div>
    </main>
</div>
<script src="../shared/i18n.js"></script>
<script src="script.js"></script>
</body>
</html>
