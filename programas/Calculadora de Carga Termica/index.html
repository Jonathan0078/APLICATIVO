<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="ctermica.title">Calculadora de Carga Térmica PRO</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <svg style="display:none" aria-hidden="true">
        <defs>
            <symbol id="icon-snowflake" viewBox="0 0 24 24">
                <line x1="12" y1="2" x2="12" y2="22"></line>
                <line x1="4" y1="7" x2="20" y2="17"></line>
                <line x1="20" y1="7" x2="4" y2="17"></line>
            </symbol>
            <symbol id="icon-sun" viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="4"></circle>
                <line x1="12" y1="1" x2="12" y2="4"></line>
                <line x1="12" y1="20" x2="12" y2="23"></line>
                <line x1="3.5" y1="3.5" x2="5.6" y2="5.6"></line>
                <line x1="18.4" y1="18.4" x2="20.5" y2="20.5"></line>
                <line x1="1" y1="12" x2="4" y2="12"></line>
                <line x1="20" y1="12" x2="23" y2="12"></line>
                <line x1="3.5" y1="20.5" x2="5.6" y2="18.4"></line>
                <line x1="18.4" y1="5.6" x2="20.5" y2="3.5"></line>
            </symbol>
            <symbol id="icon-moon" viewBox="0 0 24 24">
                <path d="M20 14.5A8.5 8.5 0 1 1 9.5 4a6.8 6.8 0 0 0 10.5 10.5z"></path>
            </symbol>
            <symbol id="icon-window" viewBox="0 0 24 24">
                <rect x="3" y="3" width="18" height="18" rx="1"></rect>
                <line x1="12" y1="3" x2="12" y2="21"></line>
                <line x1="3" y1="12" x2="21" y2="12"></line>
            </symbol>
            <symbol id="icon-building" viewBox="0 0 24 24">
                <rect x="4" y="2" width="16" height="20" rx="1"></rect>
                <line x1="8" y1="6" x2="8" y2="6.01"></line>
                <line x1="12" y1="6" x2="12" y2="6.01"></line>
                <line x1="16" y1="6" x2="16" y2="6.01"></line>
                <line x1="8" y1="10" x2="8" y2="10.01"></line>
                <line x1="12" y1="10" x2="12" y2="10.01"></line>
                <line x1="16" y1="10" x2="16" y2="10.01"></line>
                <line x1="8" y1="14" x2="8" y2="14.01"></line>
                <line x1="12" y1="14" x2="12" y2="14.01"></line>
                <line x1="16" y1="14" x2="16" y2="14.01"></line>
                <rect x="9" y="17" width="6" height="5"></rect>
            </symbol>
            <symbol id="icon-bolt" viewBox="0 0 24 24">
                <polygon points="13 2 4 14 12 14 11 22 20 10 12 10 13 2"></polygon>
            </symbol>
            <symbol id="icon-users" viewBox="0 0 24 24">
                <circle cx="9" cy="8" r="3.2"></circle>
                <path d="M3.5 20c0-3.2 2.5-5.5 5.5-5.5s5.5 2.3 5.5 5.5"></path>
                <circle cx="17" cy="9" r="2.4"></circle>
                <path d="M14.8 14.7c2.7 0 4.7 2 4.7 5.3"></path>
            </symbol>
            <symbol id="icon-calculator" viewBox="0 0 24 24">
                <rect x="4" y="2" width="16" height="20" rx="2"></rect>
                <line x1="8" y1="6" x2="16" y2="6"></line>
                <line x1="7" y1="11" x2="9" y2="11"></line>
                <line x1="11" y1="11" x2="13" y2="11"></line>
                <line x1="15" y1="11" x2="17" y2="11"></line>
                <line x1="7" y1="15" x2="9" y2="15"></line>
                <line x1="11" y1="15" x2="13" y2="15"></line>
                <line x1="15" y1="15" x2="17" y2="15"></line>
                <line x1="7" y1="19" x2="9" y2="19"></line>
                <line x1="11" y1="19" x2="13" y2="19"></line>
                <line x1="15" y1="19" x2="17" y2="19"></line>
            </symbol>
            <symbol id="icon-info" viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="9.5"></circle>
                <line x1="12" y1="11" x2="12" y2="16.5"></line>
                <circle cx="12" cy="7.7" r="0.6" fill="currentColor" stroke="none"></circle>
            </symbol>
            <symbol id="icon-trash" viewBox="0 0 24 24">
                <line x1="4" y1="6" x2="20" y2="6"></line>
                <path d="M8 6V4a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v2"></path>
                <path d="M6 6l1 15a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1l1-15"></path>
                <line x1="10" y1="10" x2="10" y2="18"></line>
                <line x1="14" y1="10" x2="14" y2="18"></line>
            </symbol>
            <symbol id="icon-close" viewBox="0 0 24 24">
                <line x1="5" y1="5" x2="19" y2="19"></line>
                <line x1="19" y1="5" x2="5" y2="19"></line>
            </symbol>
        </defs>
    </svg>

    <div class="app-container">
        <header class="app-header">
            <div class="header-content">
                <h1><svg class="icon"><use href="#icon-snowflake"></use></svg> <span data-i18n="ctermica.header">Carga Térmica PRO</span></h1>
                <div class="theme-switcher">
                    <svg class="icon" aria-hidden="true"><use href="#icon-sun"></use></svg>
                    <label class="switch">
                        <span class="visually-hidden" data-i18n="ctermica.theme_toggle">Alternar tema escuro</span>
                        <input type="checkbox" id="theme-toggle-checkbox">
                        <span class="slider"></span>
                    </label>
                    <svg class="icon" aria-hidden="true"><use href="#icon-moon"></use></svg>
                </div>
            </div>
        </header>

        <main class="app-main">
            <div id="inputs-column">

                <div class="card">
                    <div class="card-header">
                        <h2><svg class="icon"><use href="#icon-window"></use></svg> <span data-i18n="ctermica.windows">1. Janelas (m²)</span></h2>
                        <button type="button" class="info-btn" data-info="janelas" title="Ver fatores utilizados em Janelas" data-i18n-title="ctermica.info_windows">
                            <svg class="icon"><use href="#icon-info"></use></svg>
                        </button>
                    </div>
                    <div class="input-grid">
                        <div class="input-group">
                            <label for="in-sol-leste-oeste" data-i18n="ctermica.sun_east_west">Sol Leste ou Oeste</label>
                            <input type="number" inputmode="decimal" id="in-sol-leste-oeste" class="calc-input" data-fator="520" min="0" placeholder="0">
                        </div>
                        <div class="input-group">
                            <label for="in-sol-se-so" data-i18n="ctermica.sun_se_sw">Sol SE ou SO</label>
                            <input type="number" inputmode="decimal" id="in-sol-se-so" class="calc-input" data-fator="354" min="0" placeholder="0">
                        </div>
                        <div class="input-group">
                            <label for="in-sol-ne-no" data-i18n="ctermica.sun_ne_nw">Sol NE ou NO</label>
                            <input type="number" inputmode="decimal" id="in-sol-ne-no" class="calc-input" data-fator="415" min="0" placeholder="0">
                        </div>
                        <div class="input-group">
                            <label for="in-sol-norte" data-i18n="ctermica.sun_north">Sol Norte</label>
                            <input type="number" inputmode="decimal" id="in-sol-norte" class="calc-input" data-fator="223" min="0" placeholder="0">
                        </div>
                        <div class="input-group">
                            <label for="in-sombra" data-i18n="ctermica.shade">À sombra</label>
                            <input type="number" inputmode="decimal" id="in-sombra" class="calc-input" data-fator="42" min="0" placeholder="0">
                        </div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">
                        <h2><svg class="icon"><use href="#icon-building"></use></svg> <span data-i18n="ctermica.construction">2. Construção (m²)</span></h2>
                        <button type="button" class="info-btn" data-info="construcao" title="Ver fatores utilizados em Construção" data-i18n-title="ctermica.info_construction">
                            <svg class="icon"><use href="#icon-info"></use></svg>
                        </button>
                    </div>
                    <div class="input-grid">
                        <div class="input-group">
                            <label for="in-parede-30" data-i18n="ctermica.wall_30">Parede insolada (30cm)</label>
                            <input type="number" inputmode="decimal" id="in-parede-30" class="calc-input" data-fator="34" min="0" placeholder="0">
                        </div>
                        <div class="input-group">
                            <label for="in-parede-15" data-i18n="ctermica.wall_15">Parede insolada (15cm)</label>
                            <input type="number" inputmode="decimal" id="in-parede-15" class="calc-input" data-fator="43" min="0" placeholder="0">
                        </div>
                        <div class="input-group">
                            <label for="in-telhado-sem" data-i18n="ctermica.roof_no_iso">Telhado s/ isolamento</label>
                            <input type="number" inputmode="decimal" id="in-telhado-sem" class="calc-input" data-fator="49" min="0" placeholder="0">
                        </div>
                        <div class="input-group">
                            <label for="in-telhado-com" data-i18n="ctermica.roof_iso">Telhado c/ isolamento</label>
                            <input type="number" inputmode="decimal" id="in-telhado-com" class="calc-input" data-fator="9" min="0" placeholder="0">
                        </div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">
                        <h2><svg class="icon"><use href="#icon-bolt"></use></svg> <span data-i18n="ctermica.internal_loads">3. Cargas Internas</span></h2>
                        <button type="button" class="info-btn" data-info="internas" title="Ver fatores utilizados em Cargas Internas" data-i18n-title="ctermica.info_internal">
                            <svg class="icon"><use href="#icon-info"></use></svg>
                        </button>
                    </div>
                    <div class="input-grid">
                        <div class="input-group">
                            <label for="in-luz-incandescente"><span data-i18n="ctermica.light_inc">Luz Incandescente</span> <span data-i18n="ctermica.watts">(Watts)</span></label>
                            <input type="number" inputmode="decimal" id="in-luz-incandescente" class="calc-input" data-fator="0.86" min="0" placeholder="0">
                        </div>
                        <div class="input-group">
                            <label for="in-luz-fluorescente"><span data-i18n="ctermica.light_fluor">Luz Fluorescente</span> <span data-i18n="ctermica.watts">(Watts)</span></label>
                            <input type="number" inputmode="decimal" id="in-luz-fluorescente" class="calc-input" data-fator="1.032" min="0" placeholder="0">
                        </div>
                        <div class="input-group">
                            <label for="in-equip-gerais"><span data-i18n="ctermica.equip">Equip. Gerais</span> <span data-i18n="ctermica.watts">(Watts)</span></label>
                            <input type="number" inputmode="decimal" id="in-equip-gerais" class="calc-input" data-fator="0.86" min="0" placeholder="0">
                        </div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">
                        <h2><svg class="icon"><use href="#icon-users"></use></svg> <span data-i18n="ctermica.occupancy">4. Ocupação & Ventilação</span></h2>
                        <button type="button" class="info-btn" data-info="ocupacao" title="Ver fatores utilizados em Ocupação e Ventilação" data-i18n-title="ctermica.info_occupancy">
                            <svg class="icon"><use href="#icon-info"></use></svg>
                        </button>
                    </div>
                    <div class="input-grid">
                        <div class="input-group">
                            <label for="in-pessoas-sentadas"><span data-i18n="ctermica.people_sit">Pessoas Sentadas</span> <span data-i18n="ctermica.qty">(Qtd)</span></label>
                            <input type="number" inputmode="decimal" id="in-pessoas-sentadas" class="calc-input" data-fator="100" min="0" placeholder="0">
                        </div>
                        <div class="input-group">
                            <label for="in-trabalho-leve"><span data-i18n="ctermica.work_light">Trabalho Leve</span> <span data-i18n="ctermica.qty">(Qtd)</span></label>
                            <input type="number" inputmode="decimal" id="in-trabalho-leve" class="calc-input" data-fator="189" min="0" placeholder="0">
                        </div>
                        <div class="input-group">
                            <label for="in-infiltracao"><span data-i18n="ctermica.ventilation">Infiltração/Vent.</span> <span data-i18n="ctermica.m3h">(m³/h)</span></label>
                            <input type="number" inputmode="decimal" id="in-infiltracao" class="calc-input" data-fator="8.2" min="0" placeholder="0">
                        </div>
                    </div>
                </div>

                <div class="actions-row">
                    <button type="button" id="btn-reset" class="btn-reset">
                        <svg class="icon"><use href="#icon-trash"></use></svg>
                        <span data-i18n="ctermica.clear_fields">Limpar campos</span>
                    </button>
                </div>

            </div>

            <div id="outputs-column">
                <div class="card" id="results-card">
                    <div class="card-header">
                        <h2><svg class="icon"><use href="#icon-calculator"></use></svg> <span data-i18n="ctermica.results">Resultado Final</span></h2>
                    </div>
                    <div class="resultado-container success" aria-live="polite">
                        <div class="resultado-display">
                            <span class="result-main-text" id="res-btu">0 <span style="font-size: 1rem;">Btu/h</span></span>

                            <div style="display: flex; justify-content: center; gap: 1.5rem; margin-top: 0.5rem;">
                                <span class="result-sub-text"><span id="res-kcal">0</span> kcal/h</span>
                                <span class="result-sub-text"><span id="res-tr">0.00</span> TR</span>
                            </div>
                        </div>
                        <p class="empty-state" id="empty-state" data-i18n="ctermica.empty_state">Preencha ao menos um campo acima para calcular.</p>
                        <p class="result-recomendacao" id="result-recomendacao" hidden></p>
                    </div>
                </div>
            </div>

        </main>
    </div>

    <div class="info-modal-overlay" id="info-modal-overlay" aria-hidden="true">
        <div class="info-modal" role="dialog" aria-modal="true" aria-labelledby="info-modal-titulo">
            <div class="info-modal-header">
                <h3 id="info-modal-titulo" data-i18n="ctermica.modal_title">Fatores utilizados</h3>
                <button type="button" class="info-modal-close" id="info-modal-close" aria-label="Fechar" data-i18n-label="ctermica.close">
                    <svg class="icon"><use href="#icon-close"></use></svg>
                </button>
            </div>
            <dl id="info-modal-lista"></dl>
            <p class="info-note" id="info-modal-nota"></p>
        </div>
    </div>

    <script src="../shared/i18n.js"></script>
    <script src="script.js"></script>
</body>
</html>
