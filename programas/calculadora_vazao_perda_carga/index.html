<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="vazao.title">Calculadora de Vazão e Perda de Carga</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="../../assets/icons/fontawesome.css">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="header-content">
                <h1><i class="fas fa-tint"></i> <span data-i18n="vazao.title">Calculadora de Vazão e Perda de Carga</span></h1>
                <div class="theme-switcher">
                    <i class="fa-solid fa-sun"></i>
                    <label class="switch"><input type="checkbox" id="themeToggle"><span class="slider"></span></label>
                    <i class="fa-solid fa-moon"></i>
                </div>
            </div>
        </header>

        <main class="app-main">
            <div id="inputs-column" class="card">
                <h2><i class="fas fa-cogs"></i> <span data-i18n="label.inputs">Entradas</span></h2>
                <div class="input-grid">
                    <div class="input-group">
                        <label for="flowRate" data-i18n="vazao.flow">Vazão (Q) (m³/h)</label>
                        <input type="number" id="flowRate" placeholder="Ex: 100" data-i18n-placeholder="vazao.flow_placeholder">
                    </div>
                    <div class="input-group">
                        <label for="diameter" data-i18n="vazao.inner_dia">Diâmetro Interno (D) (mm)</label>
                        <input type="number" id="diameter" placeholder="Ex: 150" data-i18n-placeholder="vazao.diameter_placeholder">
                    </div>
                    <div class="input-group">
                        <label for="length" data-i18n="vazao.pipe_length">Comprimento (L) (m)</label>
                        <input type="number" id="length" placeholder="Ex: 500" data-i18n-placeholder="vazao.length_placeholder">
                    </div>
                    <div class="input-group">
                        <label for="roughness" data-i18n="vazao.roughness">Rugosidade (ε) (mm)</label>
                        <input type="number" id="roughness" value="0.046">
                    </div>
                    <div class="input-group">
                        <label for="viscosity" data-i18n="vazao.viscosity">Viscosidade (ν) (cSt)</label>
                        <input type="number" id="viscosity" value="1.004">
                    </div>
                </div>
                <div class="button-group">
                    <button id="calculateBtn" class="main-button"><i class="fas fa-calculator"></i> <span data-i18n="calc.btn">Calcular</span></button>
                    <button id="clearBtn" class="secondary-button"><i class="fas fa-eraser"></i> <span data-i18n="reset.btn">Limpar</span></button>
                </div>
            </div>

            <div id="outputs-column" class="card">
                <h2><i class="fas fa-chart-line"></i> <span data-i18n="result.title">Resultados</span></h2>
                <div id="results" class="results-grid" style="display: none;">
                    <div class="result-item">
                        <span class="label" data-i18n="vazao.velocity">Velocidade</span>
                        <span id="velocity" class="value">--</span>
                        <span class="unit">m/s</span>
                    </div>
                    <div class="result-item">
                        <span class="label" data-i18n="vazao.head_loss">Perda de Carga Unitária</span>
                        <span id="headLoss" class="value">--</span>
                        <span class="unit">m.c.a./m</span>
                    </div>
                    <div class="result-item">
                        <span class="label" data-i18n="vazao.friction_factor">Fator de Atrito</span>
                        <span id="frictionFactor" class="value">--</span>
                        <span class="unit"></span>
                    </div>
                    <div class="result-item">
                        <span class="label" data-i18n="vazao.reynolds">Nº de Reynolds</span>
                        <span id="reynolds" class="value">--</span>
                        <span class="unit"></span>
                    </div>
                </div>
                <div class="result-placeholder" id="resultPlaceholder">
                    <i class="fas fa-info-circle"></i>
                    <span data-i18n="result.placeholder">Preencha os dados e clique em Calcular para ver os resultados.</span>
                </div>
            </div>
        </main>
    </div>
    <script src="../shared/i18n.js"></script>
    <script src="script.js"></script>
</body>
</html>
