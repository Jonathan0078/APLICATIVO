<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doutor Mancal - Assistente Técnico</title>
    
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="header-content">
                <h1><i class="fas fa-cogs" aria-hidden="true"></i> Doutor Mancal</h1>
                <div class="theme-switcher">
                    <i class="fas fa-sun" aria-hidden="true"></i>
                    <label class="switch">
                        <input type="checkbox" id="theme-toggle">
                        <span class="slider"></span>
                    </label>
                    <i class="fas fa-moon" aria-hidden="true"></i>
                </div>
            </div>
        </header>

        <main class="app-main">
            <div id="inputs-column">
                <div class="card">
                    <h2><i class="fas fa-search" aria-hidden="true"></i> Ferramenta de Consulta</h2>
                    <form id="search-form">
                        <div class="input-group">
                            <label for="search-input">Buscar por Designação</label>
                            <input type="text" id="search-input" placeholder="Ex: SNL, UCP, UCF, SBPF...">
                        </div>
                        
                        <!-- NOVO CAMPO: Filtro por diâmetro do eixo -->
                        <div class="input-group" style="margin-top: 1rem;">
                            <label for="shaft-input">Filtrar por Diâmetro do Eixo (mm)</label>
                            <input type="number" id="shaft-input" placeholder="Ex: 50">
                        </div>
                    </form>
                </div>
            </div>

            <div id="outputs-column">
                <div class="card" id="results-card">
                    <div id="results-container">
                        <!-- NOVO: Indicador de carregamento inicial -->
                        <div id="loader">
                            <p>Carregando base de dados, por favor aguarde...</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
