<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title data-i18n="divider.title">Divisor de Tensão</title>
    <link rel="stylesheet" href="../../shared/base.css">
    <link rel="stylesheet" href="../../../assets/icons/fontawesome.css">
    <style>
        :root { --accent-eletronica: #10b981; }
        body.dark-theme { --accent: #10b981; }
        .app-header h1 i { color: var(--accent-eletronica); }
        .grid { display: grid; gap: 1rem; }
        .card { padding: 1.25rem; }
        .card h2 { font-size: 1rem; margin-bottom: 1rem; display: flex; align-items: center; gap: 8px; }
        .form-group { margin-bottom: .85rem; }
        .form-group label { display: block; font-size: .75rem; font-weight: 600; color: var(--text-secondary); margin-bottom: .3rem; text-transform: uppercase; letter-spacing: .04em; }
        .form-group input { width: 100%; padding: .7rem .85rem; border: 2px solid var(--border); border-radius: var(--radius-sm); font-size: .9rem; font-family: var(--font); background: var(--surface); color: var(--text); outline: none; transition: border-color .2s; }
        .form-group input:focus { border-color: var(--accent); }
        .btn { width: 100%; padding: .85rem; background: linear-gradient(135deg, #1e3a5f, var(--accent)); color: #fff; border: none; border-radius: var(--radius-sm); font-size: .9rem; font-weight: 700; cursor: pointer; font-family: var(--font); transition: transform .15s; }
        .btn:active { transform: scale(.97); }
        .btn-secondary { background: var(--bg); color: var(--text); }
        .tabs { display: flex; gap: 8px; margin-bottom: 1rem; }
        .tab-btn { flex: 1; padding: .5rem; border-radius: var(--radius-sm); font-size: .78rem; font-weight: 700; border: none; cursor: pointer; font-family: var(--font); text-align: center; transition: all .2s; }
        .tab-btn.active { background: var(--accent); color: #fff; }
        .tab-btn.inactive { background: rgba(255,255,255,0.06); color: var(--text-secondary); border: 1px solid rgba(255,255,255,0.08); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .result-box { background: var(--bg); border-radius: var(--radius-sm); padding: 1.25rem; text-align: center; margin-top: 1rem; }
        .result-box .value { font-size: 1.5rem; font-weight: 800; color: var(--text); }
        .result-box .label { font-size: .7rem; color: var(--text-secondary); text-transform: uppercase; font-weight: 600; margin-bottom: 4px; }
        .diagram { display: flex; align-items: center; justify-content: center; gap: 1rem; margin: 1.5rem 0; font-size: 1.2rem; color: var(--text); }
        .diagram svg { width: 100%; max-width: 200px; height: auto; }
        @media (max-width: 480px) { .diagram { font-size: 1rem; } }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="header-content">
                <h1><i class="fa-solid fa-divide"></i> <span data-i18n="divider.header">Divisor de Tensão</span></h1>
                <div class="theme-switcher">
                    <i class="fa-solid fa-sun"></i>
                    <label class="switch"><input type="checkbox" id="theme-toggle"><span class="slider"></span></label>
                    <i class="fa-solid fa-moon"></i>
                </div>
            </div>
        </header>
        <main class="main-content">
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('calc')" data-i18n="divider.tab_calc">Calcular Vout</button>
                <button class="tab-btn inactive" onclick="switchTab('design')" data-i18n="divider.tab_design">Projetar</button>
            </div>

            <div id="tab-calc" class="tab-content active">
                <div class="card">
                    <h2><i class="fa-solid fa-calculator"></i> <span data-i18n="divider.calc_title">Calcular Tensão de Saída</span></h2>
                    <div class="diagram">
                        <svg viewBox="0 0 160 180" xmlns="http://www.w3.org/2000/svg">
                            <line x1="80" y1="10" x2="80" y2="40" stroke="var(--text)" stroke-width="2"/>
                            <rect x="65" y="40" width="30" height="35" rx="4" fill="none" stroke="var(--text)" stroke-width="2"/>
                            <text x="80" y="62" text-anchor="middle" font-size="11" fill="var(--text)" font-weight="700">R1</text>
                            <line x1="80" y1="75" x2="80" y2="90" stroke="var(--text)" stroke-width="2"/>
                            <line x1="80" y1="90" x2="40" y2="90" stroke="var(--text)" stroke-width="2"/>
                            <line x1="40" y1="90" x2="40" y2="105" stroke="var(--text)" stroke-width="2"/>
                            <rect x="25" y="105" width="30" height="35" rx="4" fill="none" stroke="var(--text)" stroke-width="2"/>
                            <text x="40" y="127" text-anchor="middle" font-size="11" fill="var(--text)" font-weight="700">R2</text>
                            <line x1="40" y1="140" x2="40" y2="160" stroke="var(--text)" stroke-width="2"/>
                            <line x1="40" y1="160" x2="80" y2="160" stroke="var(--text)" stroke-width="2"/>
                            <line x1="80" y1="160" x2="80" y2="170" stroke="var(--text)" stroke-width="2"/>
                            <line x1="80" y1="90" x2="120" y2="90" stroke="var(--text)" stroke-width="2" stroke-dasharray="4,3"/>
                            <line x1="120" y1="90" x2="120" y2="160" stroke="var(--text)" stroke-width="2" stroke-dasharray="4,3"/>
                            <text x="125" y="130" font-size="11" fill="var(--text)" font-weight="700" transform="rotate(270,125,130)">Vout</text>
                            <text x="80" y="25" text-anchor="middle" font-size="11" fill="var(--text)" font-weight="700">Vin</text>
                            <line x1="80" y1="170" x2="80" y2="175" stroke="var(--text)" stroke-width="2"/>
                            <circle cx="80" cy="177" r="2" fill="var(--text)"/>
                        </svg>
                    </div>
                    <div style="display:grid;gap:12px;grid-template-columns:1fr 1fr 1fr">
                        <div class="form-group"><label data-i18n="divider.vin">Vin (V)</label><input type="number" id="vin" value="12" step="any"></div>
                        <div class="form-group"><label data-i18n="divider.r1">R1 (&Omega;)</label><input type="number" id="r1" value="1000" step="any"></div>
                        <div class="form-group"><label data-i18n="divider.r2">R2 (&Omega;)</label><input type="number" id="r2" value="1000" step="any"></div>
                    </div>
                    <button class="btn" onclick="calcVout()" style="margin-top:.5rem"><i class="fa-solid fa-equals"></i> <span data-i18n="divider.calc">Calcular</span></button>
                    <div class="result-box"><div class="label" data-i18n="divider.vout_label">Tensão de Saída (Vout)</div><div class="value" id="vout-result">6.00 V</div></div>
                </div>
            </div>

            <div id="tab-design" class="tab-content">
                <div class="card">
                    <h2><i class="fa-solid fa-pen-ruler"></i> <span data-i18n="divider.design_title">Projetar Divisor</span></h2>
                    <p style="font-size:.8rem;color:var(--text-secondary);margin-bottom:1rem" data-i18n="divider.design_hint">Informe Vin e Vout desejada para encontrar a relação de resistores</p>
                    <div style="display:grid;gap:12px;grid-template-columns:1fr 1fr">
                        <div class="form-group"><label data-i18n="divider.vin">Vin (V)</label><input type="number" id="dvin" value="12" step="any"></div>
                        <div class="form-group"><label data-i18n="divider.vout">Vout (V)</label><input type="number" id="dvout" value="5" step="any"></div>
                    </div>
                    <button class="btn" onclick="designDivider()"><i class="fa-solid fa-pen-ruler"></i> <span data-i18n="divider.design_btn">Projetar</span></button>
                    <div class="result-box" id="design-result" style="display:none"><div class="label" data-i18n="divider.ratio">Relação R2/R1</div><div class="value" id="ratio-result">-</div></div>
                </div>
            </div>
        </main>
    </div>

    <script src="../../shared/i18n.js"></script>
    <script>
        function calcVout() {
            let vin = parseFloat(document.getElementById('vin').value) || 0;
            let r1 = parseFloat(document.getElementById('r1').value) || 0;
            let r2 = parseFloat(document.getElementById('r2').value) || 0;
            if (r1 + r2 === 0) { document.getElementById('vout-result').textContent = '0 V'; return; }
            let vout = vin * r2 / (r1 + r2);
            document.getElementById('vout-result').textContent = vout.toFixed(3) + ' V';
        }

        function designDivider() {
            let vin = parseFloat(document.getElementById('dvin').value) || 0;
            let vout = parseFloat(document.getElementById('dvout').value) || 0;
            if (vin <= 0 || vout <= 0 || vout >= vin) { 
                document.getElementById('design-result').style.display = 'block';
                document.getElementById('ratio-result').textContent = i18n.t('divider.error_vout');
                return;
            }
            let ratio = vout / (vin - vout);
            document.getElementById('design-result').style.display = 'block';
            document.getElementById('ratio-result').textContent = 'R2 = ' + ratio.toFixed(3) + ' \u00D7 R1';
        }

        let currentTab = 'calc';
        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach((b,i) => {
                b.className = 'tab-btn ' + ((i===0&&tab==='calc'||i===1&&tab==='design') ? 'active' : 'inactive');
            });
            document.getElementById('tab-calc').classList.toggle('active', tab === 'calc');
            document.getElementById('tab-design').classList.toggle('active', tab === 'design');
        }

        document.addEventListener('DOMContentLoaded', function() {
            const t = document.getElementById('theme-toggle');
            if (localStorage.getItem('theme') === 'dark') { document.body.classList.add('dark-theme'); t.checked = true; }
            t.addEventListener('change', function() {
                document.body.classList.toggle('dark-theme');
                localStorage.setItem('theme', document.body.classList.contains('dark-theme') ? 'dark' : 'light');
            });
            if (typeof i18n !== 'undefined') i18n.translatePage();
        });
    </script>
</body>
</html>
