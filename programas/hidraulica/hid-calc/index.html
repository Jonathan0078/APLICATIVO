<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title data-i18n="hidcalc.title">Hid-calc</title>
    <link rel="stylesheet" href="../../shared/base.css">
    <link rel="stylesheet" href="../../../assets/icons/fontawesome.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app-container">
    <header class="app-header">
        <div class="header-content">
            <h1><i class="fas fa-bars" id="menuToggle" role="button" tabindex="0" aria-label="Menu"></i> <span data-i18n="hidcalc.title">Hid-calc</span></h1>
            <div class="theme-switcher">
                <label class="switch" title="Alternar tema">
                    <input type="checkbox" id="themeToggle">
                    <span class="slider"></span>
                </label>
            </div>
        </div>
    </header>

    <div class="fullscreen-menu" id="fullscreenMenu">
        <button class="close-btn" id="closeMenuBtn">&times;</button>
        <nav class="overlay-nav" id="overlayNav"></nav>
    </div>

    <main class="main-content" id="appMain">
        <div class="mode-tabs">
            <button class="mode-tab active" data-mode="hidraulica" data-i18n="hidcalc.mode_hidraulica">Hidráulica</button>
            <button class="mode-tab" data-mode="mecanica" data-i18n="hidcalc.mode_mecanica">Mecânica</button>
        </div>
        <div id="calcTabBar"></div>
        <div id="contentArea"></div>
    </main>
</div>

<script src="../../shared/i18n.js"></script>
<script src="script.js"></script>
</body>
</html>
