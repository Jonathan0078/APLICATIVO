<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="trituradores.title">Estimativa de Vida Útil - Trituradores Pro</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon"> 
    <link rel="stylesheet" href="style.css"> <!-- O mesmo style.css do Guia de Lubrificação -->
    <link rel="stylesheet" href="../../assets/icons/fontawesome.css">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="header-content">
                <h1><i class="fa-solid fa-hammer"></i> <span data-i18n="trituradores.title_h1">Vida Útil Trituradores Pro</span></h1>
                <div class="theme-switcher">
                    <i class="fa-solid fa-sun"></i>
                    <label class="switch">
                        <input type="checkbox" id="theme-toggle-checkbox">
                        <span class="slider"></span>
                    </label>
                    <i class="fa-solid fa-moon"></i>
                </div>
            </div>
        </header>

        <main class="app-main">
            <!-- Coluna de Entradas -->
            <div id="inputs-column">
                <div class="card">
                    <h2><i class="fa-solid fa-cogs"></i> <span data-i18n="label.inputs">Configuração de Parâmetros</span></h2>
                    
                    <div class="input-grid">
                        <div class="input-group">
                            <label for="crusherType" data-i18n="trituradores.type">Tipo de Triturador:</label>
                            <select id="crusherType">
                                <option value="jaw" data-i18n="trituradores.jaw">Mandíbula</option>
                                <option value="cone" data-i18n="trituradores.cone">Cônico</option>
                                <option value="impact" data-i18n="trituradores.impact">Impacto</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label for="materialHardness" data-i18n="trituradores.hardness">Dureza do Material:</label>
                            <select id="materialHardness">
                                <option value="low" data-i18n="trituradores.low">Baixa (Ex: Calcário)</option>
                                <option value="medium" data-i18n="trituradores.medium">Média (Ex: Granito)</option>
                                <option value="high" data-i18n="trituradores.high">Alta (Ex: Quartzo)</option>
                            </select>
                        </div>
                    </div>

                    <div class="input-grid">
                        <div class="input-group">
                            <label for="nominalLifespan" data-i18n="trituradores.nominal_life">Vida Útil Nominal (h):</label>
                            <input type="number" id="nominalLifespan" placeholder="Ex: 2000" min="1" data-i18n-placeholder="trituradores.nominal_ph">
                        </div>
                        <div class="input-group">
                            <label for="dailyOperatingHours" data-i18n="trituradores.daily_hours">Operação Diária (h/dia):</label>
                            <input type="number" id="dailyOperatingHours" placeholder="Ex: 16" min="1" data-i18n-placeholder="trituradores.daily_ph">
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="operatingHours" data-i18n="trituradores.op_hours">Horas Atuais (desde a última troca):</label>
                        <input type="number" id="operatingHours" placeholder="Ex: 1500" min="0" data-i18n-placeholder="trituradores.op_hours_ph">
                    </div>

                    <div class="button-group">
                        <button id="calculateBtn" class="main-button"><i class="fa-solid fa-calculator"></i> <span data-i18n="calc.btn">Calcular Estimativa</span></button>
                    </div>
                </div>
            </div>

            <!-- Coluna de Resultados -->
            <div id="outputs-column">
                <div class="card" id="results-card">
                    <div class="card-header">
                        <h2><i class="fa-solid fa-chart-line"></i> <span data-i18n="result.title">Análise de Desgaste</span></h2>
                    </div>

                    <!-- Placeholder Inicial -->
                    <div id="resultPlaceholder" style="text-align: center; padding: 2rem; color: var(--text-secondary);">
                        <i class="fa-solid fa-circle-info" style="font-size: 2.5rem; margin-bottom: 1rem; color: var(--primary);"></i>
                        <p data-i18n="result.placeholder">Preencha os dados e clique em Calcular para visualizar a projeção.</p>
                    </div>

                    <!-- Mensagem de Erro (Oculto) -->
                    <div id="erro-container" class="resultado-container error hidden" style="display: none; margin-top: 0; margin-bottom: 1.5rem;">
                        <div class="resultado-display">
                            <span class="result-main-text"><i class="fa-solid fa-triangle-exclamation"></i> <span data-i18n="trituradores.attention">Atenção</span></span>
                            <span id="erro-msg" class="result-sub-text"></span>
                        </div>
                    </div>

                    <!-- Painel de Resultados (Oculto) -->
                    <div id="results" style="display: none;">
                        
                        <!-- Inputs desabilitados mimetizando a tabela do Guia -->
                        <div class="input-grid" style="margin-bottom: 1rem;">
                            <div class="input-group">
                                <label data-i18n="trituradores.estimated">Vida Estimada (h):</label>
                                <input type="text" id="outEstimated" readonly style="font-weight: bold; color: var(--primary); background: transparent;">
                            </div>
                            <div class="input-group">
                                <label data-i18n="trituradores.remaining">Vida Restante (h):</label>
                                <input type="text" id="outRemaining" readonly style="font-weight: bold; color: var(--primary); background: transparent;">
                            </div>
                            <div class="input-group">
                                <label data-i18n="trituradores.days">Dias Restantes:</label>
                                <input type="text" id="outDays" readonly style="font-weight: bold; color: var(--primary); background: transparent;">
                            </div>
                        </div>

                        <!-- Card de Veredito no estilo "Compatibilidade de Graxas" -->
                        <div id="verdict-container" class="resultado-container">
                            <h3 data-i18n="trituradores.replacement_forecast">Previsão de Troca</h3>
                            <div class="resultado-display">
                                <span class="result-main-text" id="outDate">--</span>
                                <span class="result-sub-text" id="outDateSub">--</span>
                            </div>
                        </div>

                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
    <!-- Inclua o i18n se estiver utilizando -->
    <script src="../shared/i18n.js"></script>
    
    <script>
        // Tema Claro/Escuro
        document.addEventListener('DOMContentLoaded', () => {
            const themeToggle = document.getElementById('theme-toggle-checkbox');
            if (localStorage.getItem('theme') === 'dark') {
                document.body.classList.add('dark-theme');
                themeToggle.checked = true;
            }
            themeToggle.addEventListener('change', (e) => {
                if (e.target.checked) {
                    document.body.classList.add('dark-theme');
                    localStorage.setItem('theme', 'dark');
                } else {
                    document.body.classList.remove('dark-theme');
                    localStorage.setItem('theme', 'light');
                }
            });
        });
    </script>
</body>
</html>
