<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="lms.plan_title">SGL - Plano de Lubrificação Pro</title>
    <link rel="manifest" href="../../manifest.json">
    <meta name="theme-color" content="#003366">
    <link rel="stylesheet" href="../../assets/icons/fontawesome.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="header-content">
                <button id="menu-toggle-btn" class="icon-button" style="color: white; font-size: 1.5rem;"><i class="fa-solid fa-bars"></i></button>
                <h1 data-i18n="lms.header"><i class="fa-solid fa-layer-group"></i> SGL Pro</h1>
                <div class="theme-switcher">
                    <i class="fa-solid fa-sun"></i><label class="switch"><input type="checkbox" id="theme-toggle-checkbox"><span class="slider"></span></label><i class="fa-solid fa-moon"></i>
                </div>
            </div>
        </header>
        <div id="fullscreen-menu" class="fullscreen-menu">
            <button id="close-menu-btn" class="icon-button close-btn"><i class="fa-solid fa-xmark"></i></button>
            <nav class="overlay-nav">
                <a href="index.html" class="nav-link"><i class="fa-solid fa-search"></i> Buscador</a>
                <a href="calculadora.html" class="nav-link"><i class="fa-solid fa-calculator"></i> Calculadora VG</a>
                <a href="plano.html" class="nav-link"><i class="fa-solid fa-calendar-check"></i> Plano de Lubrificação</a>
                <a href="mistura.html" class="nav-link"><i class="fa-solid fa-vial"></i> Calculador de Mistura</a>
                <a href="configuracoes.html" class="nav-link"><i class="fa-solid fa-cogs"></i> Configurações</a>
            </nav>
        </div>

        <main class="app-main">
            <div id="inputs-column">
                <div class="card planner-section">
                    <h2 data-i18n="lms.plan_section_title"><i class="fa-solid fa-clipboard-list"></i> Cadastrar Ativo</h2>
                    
                    <form id="plan-form" class="planner-form">
                        <div class="input-group">
                            <label for="equipamento" data-i18n="lms.equipment_tag">Equipamento / TAG</label>
                            <input type="text" id="equipamento" required placeholder="Ex: Motor Transportador">
                        </div>
                        <div class="input-group">
                            <label for="oleo-aplicado" data-i18n="lms.oil_applied">Óleo Aplicado</label>
                            <input type="text" id="oleo-aplicado" required placeholder="Ex: ISO VG 220">
                        </div>
                        <div class="input-grid">
                            <div class="input-group">
                                <label for="vida-util" data-i18n="lms.oil_life">Vida Útil (h)</label>
                                <input type="number" id="vida-util" required placeholder="5000">
                            </div>
                            <div class="input-group">
                                <label for="data-ultima-troca" data-i18n="lms.last_change_date">Última Troca</label>
                                <input type="date" id="data-ultima-troca" required>
                            </div>
                        </div>

                        <div class="button-group">
                            <button type="submit" class="main-button"><i class="fas fa-plus-circle"></i> <span data-i18n="lms.add_to_plan_btn">Adicionar ao Plano</span></button>
                        </div>
                    </form>
                </div>
            </div>

            <div id="outputs-column">
                <div class="card" id="results-card">
                    <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 1rem; margin-bottom: 1.5rem;">
                        <h2 style="border: none; margin: 0; padding: 0;"><i class="fa-solid fa-list-check"></i> Itens Ativos</h2>
                        <button id="generate-report-btn" class="secondary-button" style="border-color: var(--cor-erro); color: var(--cor-erro); padding: 0.5rem 1rem;"><i class="fas fa-file-pdf"></i> PDF</button>
                    </div>

                    <div class="table-container">
                        <table id="plan-table" style="width: 100%;">
                            <thead>
                                <tr>
                                    <th data-i18n="lms.th_equipment">Equip.</th>
                                    <th data-i18n="lms.th_oil">Óleo</th>
                                    <th data-i18n="lms.th_last_change">Última</th>
                                    <th data-i18n="lms.th_next_change">Próxima</th>
                                    <th data-i18n="lms.th_action" style="text-align: center;">Ação</th>
                                </tr>
                            </thead>
                            <tbody id="plan-table-body">
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <script type="module" src="js/plano.js"></script>
    <script src="../shared/i18n.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const menuToggle = document.getElementById('menu-toggle-btn'); const closeMenu = document.getElementById('close-menu-btn'); const fullscreenMenu = document.getElementById('fullscreen-menu');
            if(menuToggle) { menuToggle.addEventListener('click', () => { fullscreenMenu.classList.add('active'); document.body.style.overflow = 'hidden'; }); closeMenu.addEventListener('click', () => { fullscreenMenu.classList.remove('active'); document.body.style.overflow = ''; }); }
            document.querySelectorAll('.overlay-nav .nav-link').forEach(link => { if (link.getAttribute('href') === (window.location.pathname.split('/').pop() || 'plano.html')) link.classList.add('active'); });
            const themeToggleCb = document.getElementById('theme-toggle-checkbox');
            if (themeToggleCb) {
                if (localStorage.getItem('theme') === 'dark') { document.body.classList.add('dark-theme'); themeToggleCb.checked = true; }
                themeToggleCb.addEventListener('change', (e) => { document.body.classList.toggle('dark-theme', e.target.checked); localStorage.setItem('theme', e.target.checked ? 'dark' : 'light'); });
            }
        });
    </script>
</body>
</html>
