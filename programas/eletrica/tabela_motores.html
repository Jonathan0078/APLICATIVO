<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title data-i18n="eletrica.motores.title">Tabela de Motores Elétricos</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="../../assets/icons/fontawesome.css">
<style>
.motor-table th { position: sticky; top: 0; z-index: 2; }
.motor-table td { font-variant-numeric: tabular-nums; }
.motor-table .cv-col { font-weight: 700; color: var(--primary); }
body.dark-theme .motor-table .cv-col { color: var(--accent); }
.motor-table tr:hover td { background: var(--accent-light); }
.polos-badge {
  display: inline-block; padding: .15rem .5rem; border-radius: 10px;
  font-size: .68rem; font-weight: 700;
}
.polos-2 { background: #dbeafe; color: #1d4ed8; }
.polos-4 { background: #dcfce7; color: #166534; }
.polos-6 { background: #fef3c7; color: #92400e; }
.polos-8 { background: #f3e8ff; color: #6b21a8; }
body.dark-theme .polos-2 { background: #1e3a5f; color: #93c5fd; }
body.dark-theme .polos-4 { background: #14532d; color: #86efac; }
body.dark-theme .polos-6 { background: #451a03; color: #fcd34d; }
body.dark-theme .polos-8 { background: #2e1065; color: #c4b5fd; }
.result-count { font-size: .78rem; color: var(--text-secondary); margin-bottom: .5rem; }
</style>
</head>
<body>
<div class="app-container">
  <header class="app-header">
    <div class="header-content">
      <h1><i class="fa-solid fa-bolt"></i> <span data-i18n="eletrica.motores.title">Tabela de Motores Elétricos</span></h1>
      <div class="theme-switcher">
        <i class="fa-solid fa-sun"></i>
        <label class="switch"><input type="checkbox" id="themeToggle"><span class="slider"></span></label>
        <i class="fa-solid fa-moon"></i>
      </div>
    </div>
  </header>

  <main class="app-main">
    <div class="card">
      <h2><i class="fa-solid fa-filter"></i> <span data-i18n="eletrica.motores.filtros">Filtros</span></h2>
      <div class="filtro-motores">
        <select id="filtroPolo">
          <option value="todas" data-i18n="eletrica.motores.todas_rotacoes">Todas as rotações</option>
          <option value="2" data-i18n="eletrica.motores.p2">2 Polos (3600 RPM)</option>
          <option value="4" data-i18n="eletrica.motores.p4">4 Polos (1800 RPM)</option>
          <option value="6" data-i18n="eletrica.motores.p6">6 Polos (1200 RPM)</option>
          <option value="8" data-i18n="eletrica.motores.p8">8 Polos (900 RPM)</option>
        </select>
        <select id="filtroTensao">
          <option value="220" data-i18n="eletrica.motores.v220">220 V</option>
          <option value="380" data-i18n="eletrica.motores.v380">380 V</option>
          <option value="440" data-i18n="eletrica.motores.v440">440 V</option>
          <option value="760" data-i18n="eletrica.motores.v760">760 V</option>
          <option value="todas" data-i18n="eletrica.motores.todas_tensoes">Todas as tensões</option>
        </select>
        <select id="filtroCV">
          <option value="todas" data-i18n="eletrica.motores.todas_potencias">Todas as potências</option>
          <option value="pequeno" data-i18n="eletrica.motores.ate_10cv">Até 10 CV</option>
          <option value="medio" data-i18n="eletrica.motores.10a50cv">10 a 50 CV</option>
          <option value="grande" data-i18n="eletrica.motores.acima_50cv">Acima de 50 CV</option>
        </select>
      </div>
      <div class="search-box">
        <i class="fa-solid fa-search"></i>
        <input type="text" id="buscaMotor" data-i18n-placeholder="eletrica.motores.busca_placeholder" placeholder="Buscar por potência (CV ou kW)...">
      </div>
      <div class="result-count" id="resultCount" data-i18n="eletrica.motores.result_count">Exibindo todos os motores</div>
    </div>

    <div class="card">
      <h2><i class="fa-solid fa-table"></i> <span data-i18n="eletrica.motores.dados_tecnicos">Dados Técnicos</span></h2>
      <div class="table-wrap">
        <table class="motor-table" id="motorTable">
          <thead>
            <tr>
              <th data-i18n="eletrica.motores.th_cv">CV</th>
              <th data-i18n="eletrica.motores.th_kw">kW</th>
              <th data-i18n="eletrica.motores.th_polos">Pólos</th>
              <th data-i18n="eletrica.motores.th_rpm">RPM</th>
              <th id="thTensao" data-i18n="eletrica.motores.th_220v">220V (A)</th>
              <th data-i18n="eletrica.motores.th_380v">380V (A)</th>
              <th data-i18n="eletrica.motores.th_440v">440V (A)</th>
              <th data-i18n="eletrica.motores.th_760v">760V (A)</th>
              <th data-i18n="eletrica.motores.th_rend">Rend. (%)</th>
              <th data-i18n="eletrica.motores.th_fp">FP</th>
              <th data-i18n="eletrica.motores.th_ipin">Ip/In</th>
              <th data-i18n="eletrica.motores.th_carcaca">Carcaça</th>
            </tr>
          </thead>
          <tbody id="motorBody"></tbody>
        </table>
      </div>
    </div>
  </main>
</div>

  {cv:200, kw:150, polos:8, rpm:890, i220:410, i380:238, i440:205, i760:119, rend:89.0, fp:0.81, ipin:6.5, carc:'315'},
];

function fmt(v) { return v != null ? v.toFixed(2) : '—'; }
function fmt1(v) { return v != null ? v.toFixed(1) : '—'; }

function renderTable() {
    var polos = document.getElementById('filtroPolo').value;
    var tensao = document.getElementById('filtroTensao').value;
    var cvFiltro = document.getElementById('filtroCV').value;
    var busca = document.getElementById('buscaMotor').value.toLowerCase().trim();

    var filtered = motores.filter(function(m) {
        if (polos !== 'todas' && m.polos !== parseInt(polos)) return false;
        if (tensao !== 'todas') {
            var key = 'i' + tensao;
            if (m[key] === null || m[key] === undefined) return false;
        }
        if (cvFiltro === 'pequeno' && m.cv > 10) return false;
        if (cvFiltro === 'medio' && (m.cv < 10 || m.cv > 50)) return false;
        if (cvFiltro === 'grande' && m.cv <= 50) return false;
        if (busca) {
            var txt = m.cv + ' ' + m.kw + ' ' + m.carc + ' ' + m.rpm;
            if (txt.indexOf(busca) === -1) return false;
        }
        return true;
    });

    var thTensao = document.getElementById('thTensao');
    var tensaoKey = tensao !== 'todas' ? 'eletrica.motores.th_' + tensao + 'v' : 'eletrica.motores.th_220v';
    thTensao.setAttribute('data-i18n', tensaoKey);
    thTensao.textContent = i18n.t(tensaoKey);

    var tbody = document.getElementById('motorBody');
    tbody.innerHTML = '';
    filtered.forEach(function(m) {
        var polosClass = 'polos-' + m.polos;
        var tr = document.createElement('tr');
        tr.innerHTML =
            '<td class="cv-col">' + m.cv + '</td>' +
            '<td>' + m.kw.toFixed(2) + '</td>' +
            '<td><span class="polos-badge ' + polosClass + '">' + m.polos + 'P</span></td>' +
            '<td>' + m.rpm + '</td>' +
            '<td>' + fmt(m.i220) + '</td>' +
            '<td>' + fmt(m.i380) + '</td>' +
            '<td>' + fmt(m.i440) + '</td>' +
            '<td>' + fmt(m.i760) + '</td>' +
            '<td>' + fmt1(m.rend) + '</td>' +
            '<td>' + m.fp.toFixed(2) + '</td>' +
            '<td>' + m.ipin.toFixed(1) + '</td>' +
            '<td>' + m.carc + '</td>';
        tbody.appendChild(tr);
    });

    document.getElementById('resultCount').textContent =
        window.i18n.t('eletrica.motores.exibindo') + ' ' + filtered.length + ' ' + window.i18n.t('eletrica.motores.de') + ' ' + motores.length + ' ' + window.i18n.t('eletrica.motores.motores');
}

document.getElementById('filtroPolo').addEventListener('change', renderTable);
document.getElementById('filtroTensao').addEventListener('change', renderTable);
document.getElementById('filtroCV').addEventListener('change', renderTable);
document.getElementById('buscaMotor').addEventListener('input', renderTable);

document.addEventListener('DOMContentLoaded', function() {
    initTheme();
    renderTable();
});
</script>
</body>
</html>
