<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor de MM para Polegadas</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header class="header">
        <div>
            <h1>Conversor de Milímetros para Polegadas Fracionárias</h1>
            <p>Converta valores de mm para polegadas fracionárias e consulte referências rápidas</p>
        </div>
        <div>
            <button id="theme-btn" aria-label="Alternar tema" title="Alternar tema" class="icon-button">
                <i class="fas fa-moon"></i>
            </button>
        </div>
    </header>
    <main class="main-container">
        <section class="calculator-container">
            <h2 class="section-title">Conversão</h2>
            <p class="helper-text instruction">Digite o valor em milímetros e clique em Converter</p>
            <div class="input-group single">
                <div class="label-wrapper">
                    <label for="mm-input">Milímetros (mm)</label>
                    <input type="number" id="mm-input" placeholder="Digite o valor em mm" step="any" min="0" max="999999" autofocus>
                </div>
                <div class="field-pair">
                    <button id="convert-btn">Converter</button>
                </div>
            </div>
            <div class="result-container">
                <p id="result-text">-</p>
                <button id="copy-btn" class="icon-button" aria-label="Copiar resultado">
                    <i class="fas fa-copy"></i>
                </button>
            </div>
        </section>
        <section class="calculator-container">
            <h2 class="section-title">Valores de Referência Comuns</h2>
            <div id="reference-container" class="reference-container"></div>
        </section>
    </main>
    <footer>
        <p class="copyright">&copy; 2025 Conversor MM &rarr; Polegadas. Todos os direitos reservados.</p>
    </footer>
    <div id="toast" class="toast" role="alert"></div>
    <script src="script.js"></script>
</body>
</html>
