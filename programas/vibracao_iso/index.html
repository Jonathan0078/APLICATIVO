<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title data-i18n="vibracao.title">Severidade Vibração (ISO 10816)</title>
    <link rel="stylesheet" href="../../assets/icons/fontawesome.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-container">
    <header class="app-header">
        <div class="header-content">
            <h1><i class="fa-solid fa-wave-square"></i> <span data-i18n="vibracao.title">Severidade Vibração (ISO 10816)</span></h1>
            <div class="theme-switcher">
                <i class="fa-solid fa-sun"></i>
                <label class="switch">
                    <input type="checkbox" id="theme-toggle-checkbox">
                    <span class="slider"></span>
                </label>
                <i class="fa-solid fa-moon"></i>
            </div>
        </div>
    </header>

    <main class="app-main">
        <div id="inputs-column">
            <div class="card">
                <h2><i class="fa-solid fa-sliders"></i> <span data-i18n="vibracao.params">Parâmetros de Medição</span></h2>

                <div class="input-group">
                    <label for="input-velocity" data-i18n="vibracao.velocity">Velocidade (mm/s RMS)</label>
                    <input type="number" id="input-velocity" class="calc-input" min="0" step="0.01" placeholder="Ex: 4.5" data-i18n-placeholder="vibracao.velocity_ph">
                </div>

                <div class="input-group">
                    <label for="input-class" data-i18n="vibracao.machine_class">Classe da Máquina</label>
                    <select id="input-class" class="calc-input">
                        <option value="I" data-i18n="vibracao.class_i">Classe I - Máquinas pequenas (≤ 15 kW)</option>
                        <option value="II" data-i18n="vibracao.class_ii">Classe II - Máquinas médias (15 a 75 kW)</option>
                        <option value="III" selected data-i18n="vibracao.class_iii">Classe III - Máquinas grandes (rígida, > 75 kW)</option>
                        <option value="IV" data-i18n="vibracao.class_iv">Classe IV - Máquinas grandes (flexível, > 75 kW)</option>
                    </select>
                </div>

                <div class="input-group">
                    <label for="input-mounting" data-i18n="vibracao.mounting">Tipo de Montagem</label>
                    <select id="input-mounting" class="calc-input">
                        <option value="rigid" data-i18n="vibracao.mounting_rigid">Fundação Rígida</option>
                        <option value="flexible" data-i18n="vibracao.mounting_flexible">Fundação Flexível</option>
                    </select>
                </div>

                <button id="calc-btn" class="btn-primary"><i class="fa-solid fa-calculator"></i> <span data-i18n="vibracao.calc_btn">Classificar</span></button>
            </div>

            <div class="card">
                <h2><i class="fa-solid fa-clock-rotate-left"></i> <span data-i18n="vibracao.history">Histórico de Classificações</span></h2>
                <ul id="history-list" class="history-list"></ul>
                <button id="clear-btn" class="btn-outline"><i class="fa-solid fa-trash-can"></i> <span data-i18n="vibracao.clear_history">Limpar Histórico</span></button>
            </div>
        </div>

        <div id="outputs-column">
            <div class="card" id="result-card">
                <h2><i class="fa-solid fa-chart-simple"></i> <span data-i18n="vibracao.result">Classificação</span></h2>
                <div id="result-display" class="result-placeholder">
                    <i class="fa-solid fa-wave-square"></i>
                    <p data-i18n="vibracao.subtitle">Insira os parâmetros e clique em Classificar</p>
                </div>

                <div id="interpretation-container" style="display:none">
                    <div class="zone-badge" id="zone-badge"></div>
                    <h3 data-i18n="vibracao.interpretation">Interpretação</h3>
                    <p id="interpretation-text"></p>
                </div>
            </div>
        </div>
    </main>
</div>

<script src="../shared/i18n.js"></script>
<script src="script.js"></script>
</body>
</html>
