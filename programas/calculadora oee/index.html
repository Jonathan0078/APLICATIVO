<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="oee.title">Calculadora OEE</title>
    <link rel="stylesheet" href="../../assets/icons/fontawesome.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="header-content">
                <h1><i class="fas fa-chart-line"></i> <span data-i18n="oee.title">Calculadora de OEE</span></h1>
                <div class="theme-switcher">
                    <i class="fas fa-sun"></i>
                    <label class="switch">
                        <input type="checkbox" id="theme-toggle">
                        <span class="slider"></span>
                    </label>
                    <i class="fas fa-moon"></i>
                </div>
            </div>
        </header>
        <main class="app-main">
            <div id="inputs-column">
                <div class="card">
                    <h2><i class="fas fa-sliders-h"></i> <span data-i18n="oee.params">Parâmetros de Cálculo</span></h2>
                    <form id="oee-form">
                        <div class="input-grid">
                            <div class="input-group">
                                <label for="tempo-planejado"><i class="fas fa-clock"></i> <span data-i18n="oee.planned_time">Tempo de Produção Planejado (min)</span></label>
                                <input type="number" id="tempo-planejado" required value="480">
                            </div>
                            <div class="input-group">
                                <label for="tempo-parada"><i class="fas fa-pause-circle"></i> <span data-i18n="oee.downtime">Tempo de Parada (min)</span></label>
                                <input type="number" id="tempo-parada" required value="47">
                            </div>
                            <div class="input-group">
                                <label for="ciclo-ideal"><i class="fas fa-stopwatch"></i> <span data-i18n="oee.ideal_cycle">Ciclo Ideal (seg/peça)</span></label>
                                <input type="number" id="ciclo-ideal" required value="60">
                            </div>
                            <div class="input-group">
                                <label for="pecas-produzidas"><i class="fas fa-boxes"></i> <span data-i18n="oee.total_parts">Total de Peças Produzidas</span></label>
                                <input type="number" id="pecas-produzidas" required value="400">
                            </div>
                            <div class="input-group">
                                <label for="pecas-defeituosas"><i class="fas fa-exclamation-triangle"></i> <span data-i18n="oee.defective_parts">Total de Peças Defeituosas</span></label>
                                <input type="number" id="pecas-defeituosas" required value="8">
                            </div>
                        </div>
                        <div class="button-group">
                            <button type="submit" class="main-button"><i class="fas fa-calculator"></i> <span data-i18n="calc.btn">Calcular</span></button>
                            <button type="button" id="save-btn" class="secondary-button" disabled><i class="fas fa-save"></i> <span data-i18n="btn.save">Salvar</span></button>
                            <button type="button" id="clear-form-btn" class="secondary-button"><i class="fas fa-eraser"></i> <span data-i18n="reset.btn">Limpar</span></button>
                        </div>
                    </form>
                </div>
            </div>
            <div id="outputs-column">
                <div id="results" class="card" style="display: none;">
                    <h2><i class="fas fa-chart-pie"></i> <span data-i18n="result.title">Resultados</span></h2>
                    <div class="results-charts">
                        <div class="chart-area">
                            <div class="chart-container">
                                <canvas id="oeeChart"></canvas>
                            </div>
                            <div id="oee-interpretation"></div>
                        </div>
                        <div class="chart-container-bar">
                            <canvas id="componentsChart"></canvas>
                        </div>
                    </div>
                </div>
                <div id="history" class="card">
                    <div class="card-header">
                        <h2><i class="fas fa-history"></i> <span data-i18n="label.history">Histórico</span></h2>
                        <button id="clear-history-btn" class="secondary-button"><i class="fas fa-trash-alt"></i> <span data-i18n="oee.clear_history">Limpar Histórico</span></button>
                    </div>
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th data-i18n="oee.date">Data</th>
                                    <th data-i18n="oee.oee_header">OEE</th>
                                    <th data-i18n="oee.availability">Disponibilidade</th>
                                    <th data-i18n="oee.performance">Performance</th>
                                    <th data-i18n="oee.quality">Qualidade</th>
                                </tr>
                            </thead>
                            <tbody id="history-body"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="script.js"></script>
    <script src="../shared/i18n.js"></script>
</body>
</html>
